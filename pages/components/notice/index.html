<main class="page">
  <mm-page-header
    title="Notice"
    description="시스템 상태나 사용자 행동에 대한 피드백을 인라인으로 전달합니다."
  ></mm-page-header>

  <mm-component-aka
    items='["Alert", "Callout", "Banner", "Inline message", "Feedback"]'
  ></mm-component-aka>

  <mm-component-example>
    <div style="max-width: 480px">
      <mm-flex direction="column">
        <mm-notice heading="헤딩" text="배너. 히어로와 콜아웃의 차이." dismissible></mm-notice>

        <mm-notice variant="success" text="좋아요 표시한 동영상에 추가됨"></mm-notice>
        <mm-notice
          variant="warning"
          text="바시니의 작품은 페라라 부르주아사회의 유대인 박해라는 깊은 상처에 기인한다는 점에서 정치적이다."
        ></mm-notice>
        <mm-notice variant="danger" text="인터넷에 연결되어 있지 않습니다."></mm-notice>
      </mm-flex>
    </div>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="heading" type="string" optional></mm-prop>
    <mm-prop name="text" type="string" optional></mm-prop>
    <mm-prop name="variant" type='"success" | "warning" | "danger"' optional></mm-prop>
    <mm-prop name="dismissible" type="boolean" optional></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="--notice-gap" default="var(--space-2)"></mm-token>
    <mm-token name="--notice-padding" default="var(--space-3)"></mm-token>
    <mm-token name="--notice-radius" default="var(--radius)"></mm-token>
    <mm-token name="--notice-border-width" default="var(--border-width)"></mm-token>
    <mm-token name="--notice-accent" default="var(--color-foreground-light)"></mm-token>
    <mm-token name="--notice-color" default="var(--color-foreground)"></mm-token>
    <mm-token name="--notice-bg" default="transparent"></mm-token>
    <mm-token name="--notice-border-color" default="var(--color-border)"></mm-token>
  </mm-component-tokens>

  <mm-component-guide>
    <mm-text-list
      texts='[
        "role=\"alert\" 속성이 있는 요소는 브라우저가 즉시 사용자에게 읽습니다. 긴급도가 낮은 알림에는 role=\"status\"를 사용하세요.",
        "사용자 귀책이 아닌 경우 단순 \"오류\" 대신 \"시스템 오류\"처럼 책임 소재를 명확히 해 사용자가 위축되지 않도록 합니다.",
        "독립적인 on/off가 아닌 단일 선택 그룹에는 variant를 사용합니다. 색상만으로 의미를 전달하지 않고 아이콘을 함께 제공합니다.",
        "닫기 버튼이 필요한 경우 dismissible 속성을 사용합니다. mm-dismiss 이벤트로 닫힘 시점을 감지할 수 있습니다."
      ]'
    ></mm-text-list>
  </mm-component-guide>
</main>
