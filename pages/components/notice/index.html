<main class="page">
  <mm-page-header
    heading="Notice"
    description="시스템 상태나 사용자 행동에 대한 피드백을 인라인으로 전달합니다."
  ></mm-page-header>

  <mm-component-aka
    items='["Alert", "Callout", "Banner", "Inline message", "Feedback"]'
  ></mm-component-aka>

  <mm-component-example>
    <div style="max-width: 480px">
      <mm-flex direction="column">
        <mm-notice
          heading="헤딩"
          description="배너. 히어로와 콜아웃의 차이."
          dismissible
        ></mm-notice>

        <mm-notice variant="success" description="좋아요 표시한 동영상에 추가됨"></mm-notice>
        <mm-notice
          variant="warning"
          description="바시니의 작품은 페라라 부르주아사회의 유대인 박해라는 깊은 상처에 기인한다는 점에서 정치적이다."
        ></mm-notice>
        <mm-notice variant="danger" description="인터넷에 연결되어 있지 않습니다."></mm-notice>
      </mm-flex>
    </div>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="heading" type="string" optional></mm-prop>
    <mm-prop name="description" type="string" optional></mm-prop>
    <mm-prop name="variant" type='"success" | "warning" | "danger"' optional></mm-prop>
    <mm-prop name="dismissible" type="boolean" optional></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="notice-gap" default="var(--space-2)"></mm-token>
    <mm-token name="notice-padding" default="var(--space-3)"></mm-token>
    <mm-token name="notice-border-radius" default="var(--radius)"></mm-token>
    <mm-token name="notice-border-width" default="var(--border-width)"></mm-token>
    <mm-token name="notice-accent" default="var(--color-foreground-light)"></mm-token>
    <mm-token name="notice-text-color" default="var(--color-foreground)"></mm-token>
    <mm-token name="notice-background-color" default="transparent"></mm-token>
    <mm-token name="notice-border-color" default="var(--color-border)"></mm-token>
  </mm-component-tokens>

  <mm-component-guide>
    <mm-feature-group columns="2">
      <mm-feature
        heading="Statusful"
        description="성공·경고·오류·정보 등 의미 상태를 variant 톤으로 전달합니다. 색상만으로 의미를 전달하지 않고 아이콘·텍스트를 함께 제공합니다."
      ></mm-feature>
      <mm-feature
        heading="Dismissible"
        description="사용자가 확인한 알림을 직접 닫아 치울 수 있습니다. 닫기 버튼은 dismissible 속성으로 제공하고, mm-dismiss 이벤트로 닫힘 시점을 감지합니다."
      ></mm-feature>
    </mm-feature-group>
    <mm-text-list
      texts='[
        "role=\"alert\" 속성이 있는 요소는 브라우저가 즉시 사용자에게 읽습니다. 긴급도가 낮은 알림에는 role=\"status\"를 사용하세요.",
        "사용자 귀책이 아닌 경우 단순 \"오류\" 대신 \"시스템 오류\"처럼 책임 소재를 명확히 해 사용자가 위축되지 않도록 합니다."
      ]'
    ></mm-text-list>
  </mm-component-guide>
</main>
