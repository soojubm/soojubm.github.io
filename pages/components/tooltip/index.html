<main class="page">
  <mm-page-header
    title="Tooltip"
    description="용어를 설명하거나 정보의 근거를 보충합니다."
  ></mm-page-header>

  <mm-component-example>
    <mm-flex gap="2">
      <mm-tooltip content="로그인" placement="center">
        <mm-icon-button slot="trigger" icon="user"></mm-icon-button>
      </mm-tooltip>
      <mm-tooltip content="우측 정렬" placement="right">
        <mm-icon-button slot="trigger" icon="user"></mm-icon-button>
      </mm-tooltip>
      <mm-tooltip
        content="제1항의 해임건의는 국회재적의원 3분의 1 이상의 발의에 의하여 국회재적의원 과반수의 찬성이 있어야 한다."
      >
        <!-- <span class="tooltip-trigger" aria-describedby="tooltip1"></span> -->
        <mm-icon slot="trigger" name="help-circle"></mm-icon>
      </mm-tooltip>
    </mm-flex>
    <mm-separator></mm-separator>
    <span
      class="tooltip has-tooltip-fade"
      data-tooltip="Just like this one."
      style="display: inline; width: auto; position: relative"
    >
      Any element
    </span>
  </mm-component-example>
  <style>
    [data-tooltip]:not([disabled]).has-tooltip-fade:before {
      transition: opacity 0.15s linear, visibility 0.15s linear;
    }
    [data-tooltip]:not([disabled]):hover:before {
      opacity: 1;
      visibility: visible;
    }
    [data-tooltip]:not([disabled]):before {
      display: inline-block;
      /* hyphens: auto; */
      content: attr(data-tooltip);
      opacity: 0;
      font-size: 12px;
      overflow: hidden;
      pointer-events: none;
      visibility: hidden;
      background: goldenrod;
      border-radius: var(--radius);
      padding: var(--space-1) var(--space-2);
      text-overflow: ellipsis;
      white-space: pre;
      position: absolute;
      right: auto;
      bottom: auto;
      left: 50%;
      top: 0;
      z-index: 35;
      margin-top: -5px;
      /* margin-bottom: auto; */
      -webkit-transform: translate(-50%, -100%);
      transform: translate(-50%, -100%);
    }
  </style>

  <mm-component-props>
    <mm-prop name="content" type="string"></mm-prop>
    <mm-prop name="placement" type="string" optional></mm-prop>
    <mm-prop name="slot: trigger" type="HTMLElement"></mm-prop>
  </mm-component-props>
  <!-- type Side = 'top' | 'bottom' | 'left' | 'right';

type Align = 'start' | 'end';

type Placement = Side | `${Side}-${Align}`;> -->

  <mm-component-tokens>
    <mm-token name="--tooltip-max-width" default="320px"></mm-token>
    <mm-token name="--tooltip-padding" default="0.5rem var(--space-3)"></mm-token>
    <mm-token name="--tooltip-radius" default="var(--radius)"></mm-token>
    <mm-token name="--tooltip-color" default="var(--color-background-strong)"></mm-token>
    <mm-token name="--tooltip-text-color" default="var(--color-foreground-on-solid)"></mm-token>
    <mm-token name="--tooltip-shadow" default="var(--shadow)"></mm-token>
  </mm-component-tokens>

  <mm-component-guide>
    <mm-grid columns="2">
      <mm-feature
        icon="database-script-plus"
        titleText="Supplementary"
        description="작은 화면에서 바텀 시트나 팝오버로 제공하는 것이 좋다. 사용자가 반드시 숙지해야 하는 중요한 정보를 툴팁으로 제공하지 마세요."
      ></mm-feature>
      <mm-feature
        icon="thumbs-down"
        titleText="Not Recommended"
        subtitle="Easy scanning"
        description="설명이 필요없는 플로우와 인터페이스를 만들어라.. 툴팁은 없을수록 좋다. 접근성을 위한 최소한의 설명만 제공"
      ></mm-feature>
      <mm-feature
        icon="accessibility"
        titleText="Aids accessibility"
        description="TODO"
      ></mm-feature>
    </mm-grid>
    <mm-text-list
      texts='[
        "아코디언도 마찬가지. 중요한 액션을 요할 때는 cognitive? button이나 text link 등 충분히 강조되고 눈에 띄는 컴포넌트를 사용.",
        "short text, long form text. MD3 rich tooltip(title, description, actions-link/button) / plain tooltip",
        "useFloating, "
      ]'
    ></mm-text-list>

    <!-- 방법 A: 가이드라인으로만 분리 (추천)

개발 스펙은 완전히 동일하게 열어두고, 기획자나 디자이너가 쓸 때 "아이콘 버튼에는 10자 이내의 명사형으로 적고, 용어 설명에는 줄바꿈을 허용한다" 같은 글자 수 규칙만 가이드 문서에 명시합니다.

방법 B: 너비(Max-width) 옵션으로 분리

Short형 (액션 보완형): 텍스트가 한 줄로 짧게 끝나며 말줄임 없이 콤팩트한 크기.

Long형 (정보 설명형): 설명이 길어질 수 있으므로 최대 너비(max-width: 240px 등)가 지정되어 있고 자동 줄바꿈(Wrap)이 지원되는 크기. -->

    > 💡 **접근성 팁 (Accessibility Notes)** > - **액션 보완형:** 아이콘 버튼의 실질적인 이름을
    대체하므로, 버튼의 `aria-label` 값과 툴팁 텍스트를 일치시키거나 `aria-labelledby`로 강하게
    연결합니다. > - **정보 설명형:** 이미 존재하는 텍스트의 부가 설명이므로, `aria-describedby`를
    사용해 참고용 설명임을 브라우저에 알립니다.
  </mm-component-guide>

  <mm-component-section
    title="GuideTip"
    description="arrow tooltip, tourtip, coachmark, 로딩 시점에 이미 열려 있다. doorhanger/pointing arrow."
  ></mm-component-section>

  <mm-component-aka items='["Coachmark"]'></mm-component-aka>
</main>
