<main class="page">
  <mm-page-header
    heading="Popover"
    description="anchor 기준 non-modal 레이어 프리미티브입니다. TODO"
  ></mm-page-header>

  <mm-component-aka items='["Flyout", "Dropdown Panel", "Menu Surface"]'></mm-component-aka>

  <mm-component-example>
    <div class="popover-demo">
      <mm-button id="popover-trigger" aria-controls="demo-popover" aria-expanded="false">
        메뉴 열기
      </mm-button>
      <mm-popover id="demo-popover" role="menu">
        <mm-menu-item-action label="이름 변경"></mm-menu-item-action>
        <mm-menu-item-action label="삭제" tone="danger"></mm-menu-item-action>
      </mm-popover>
    </div>
  </mm-component-example>
  <style>
    .popover-demo {
      display: inline-block;
      position: relative;
    }
  </style>

  <mm-component-props>
    <mm-prop name="open" type="boolean"></mm-prop>
    <mm-prop
      name="placement"
      type="'bottom-left' | 'bottom-right' | 'top-left' | 'top-right' = 'bottom-left'"
    ></mm-prop>
    <mm-prop name="popoverclose" type="CustomEvent" kind="event"></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="popover-padding" default="var(--space-1)"></mm-token>
    <mm-token name="popover-border" default="var(--border)"></mm-token>
    <mm-token name="popover-border-radius" default="var(--radius)"></mm-token>
    <mm-token name="popover-background-color" default="var(--color-background)"></mm-token>
    <mm-token name="popover-shadow" default="var(--shadow)"></mm-token>
    <mm-token name="popover-max-height" default="none"></mm-token>
    <mm-token name="popover-width" default="auto"></mm-token>
    <mm-token name="popover-offset" default="var(--space-1)"></mm-token>
  </mm-component-tokens>

  <mm-component-guide>
    <mm-paragraph>
      레이어 프리미티브는 포지셔닝 모델과 모달리티로 나뉜다. mm-popover는 트리거에 앵커되는
      non-modal 레이어로, backdrop·portal·스크롤 잠금이 없고 배경과의 상호작용을 허용한다. viewport
      기준 modal 레이어는 mm-sheet가 담당한다.
    </mm-paragraph>
    <mm-text-list
      texts='[
        "열림 상태는 popover가 소유한다. 트리거는 aria-controls로 popover를 가리키고 클릭으로 toggle()만 호출하면, 외부 클릭·ESC 닫기와 aria-expanded 반영은 popover가 처리한다.",
        "aria-controls로 연결된 트리거가 없으면 popover는 소비자가 open을 제어하는 표면으로만 동작한다(예: mm-select의 반응형 popover·sheet 전환).",
        "role=menu/listbox를 popover 요소에 직접 지정한다.",
        "용례: select, 컨텍스트 메뉴, 댓글 항목의 수정·삭제 메뉴."
      ]'
    ></mm-text-list>
  </mm-component-guide>

  <mm-component-section
    heading="mm-select"
    description="popover를 프리미티브로 하는 선택 입력입니다. 트리거·옵션 파싱·선택 상태를 소유하고, 목록 표면은 popover에 맡깁니다. phone 뷰포트(480px 이하)에서는 같은 옵션 목록을 bottom sheet(mm-sheet)로 전환해 표시합니다."
  >
    <mm-select inline value="stable">
      <mm-button slot="trigger" size="small">릴리스 채널</mm-button>
      <option value="stable" selected>Stable</option>
      <option value="beta">Beta</option>
      <option value="canary">Canary</option>
    </mm-select>
  </mm-component-section>
</main>
