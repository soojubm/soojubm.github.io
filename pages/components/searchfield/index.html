<main class="page">
  <mm-page-header
    title="SearchField"
    description="검색 필드와 검색 패턴. 입력·자동완성·최근 검색·결과 없음 상태를 다룹니다."
  ></mm-page-header>

  <mm-component-example>
    <div style="max-width: 400px">
      <mm-searchfield placeholder="궁금한 인물이나 이슈가 있나요?"></mm-searchfield>

      <mm-search-suggestions aria-label="추천 검색어" style="margin: var(--space-3) 0">
        <mm-search-suggestion>아파트열쇠를빌려드립니다</mm-search-suggestion>
        <mm-search-suggestion>로얄테넌바움</mm-search-suggestion>
        <mm-search-suggestion>소매치기</mm-search-suggestion>
        <mm-search-suggestion>이탈리아여행</mm-search-suggestion>
      </mm-search-suggestions>

      <mm-menu-item-group aria-label="최근 검색">
        <mm-text size="14" color="var(--color-foreground-light)">최근 검색</mm-text>
        <mm-menu-item-row label="고슴이">
          <mm-avatar slot="avatar" style="background: beige">🦔</mm-avatar>
          <mm-delete-button slot="action" aria-label="고슴이 검색 내역 삭제"></mm-delete-button>
        </mm-menu-item-row>
        <mm-menu-item-row label="개구리">
          <mm-avatar slot="avatar" style="background: var(--green100)">🐸</mm-avatar>
          <mm-delete-button slot="action" aria-label="개구리 검색 내역 삭제"></mm-delete-button>
        </mm-menu-item-row>
      </mm-menu-item-group>

      <div style="height: var(--space-3)"></div>

      <mm-menu-item-group aria-label="People">
        <mm-text size="14" color="var(--color-foreground-light)">People</mm-text>
        <mm-menu-item-row label="수줍이" time="Yesterday">
          <mm-avatar slot="avatar" default="true"></mm-avatar>
        </mm-menu-item-row>
        <mm-menu-item-row label="W. G. 제발트" time="April 4, 2022">
          <mm-avatar slot="avatar" default="true"></mm-avatar>
        </mm-menu-item-row>
      </mm-menu-item-group>

      <div style="height: var(--space-3)"></div>

      <mm-menu-item-group aria-label="Channels">
        <mm-text size="14" color="var(--color-foreground-light)">Channels</mm-text>
        <mm-menu-item-row label="Design Thinking" description="12 Members">
          <mm-avatar slot="avatar">#</mm-avatar>
        </mm-menu-item-row>
        <mm-menu-item-row label="Frontend Group" description="24 Members">
          <mm-avatar slot="avatar">#</mm-avatar>
        </mm-menu-item-row>
      </mm-menu-item-group>
    </div>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="value" type="string" optional></mm-prop>
    <mm-prop name="name" type="string" optional></mm-prop>
    <mm-prop name="placeholder" type="string" optional></mm-prop>
    <mm-prop name="label" type="string" optional></mm-prop>
    <mm-prop name="helper" type="string" optional></mm-prop>
    <mm-prop name="disabled" type="boolean" optional></mm-prop>
    <mm-prop name="@input" type="CustomEvent detail: value" kind="event"></mm-prop>
  </mm-component-props>

  <mm-component-guide>
    <section class="step" data-align="vertical" style="margin: 1rem 0">
      <div class="step-item">
        <span class="step-item-icon">1</span>
        <mm-text size="14" weight="bold">검색 인지, 검색 기표</mm-text>
        <div class="step-item-description">
          <mm-text-list
            texts='[
              "키워드 입력으로 즉시 검색. 추천, 자동완성.",
              "해시태그 또는 카테고리 목록으로 제안된 인기/추천 키워드로 검색",
              "searchfield 형태의 버튼을 클릭하여 검색 뷰로 이동"
            ]'
          ></mm-text-list>
        </div>
      </div>
      <div class="step-item">
        <span class="step-item-icon">2</span>
        <mm-text size="14" weight="bold">onFocus</mm-text>
        <small>keyword.length === 0</small>
        <div class="step-item-description">
          <mm-text-list
            texts='[
              "이전 검색 내역",
              "제안Suggestions. 추천 및 인기 또는 개인화 큐레이션"
            ]'
          ></mm-text-list>
        </div>
      </div>
      <div class="step-item">
        <span class="step-item-icon">3</span>
        <mm-text size="14" weight="bold">onChange</mm-text>
        <div class="step-item-description">
          <mm-text-list
            texts='[
              "추천/자동완성/필터링",
              "결과 없음 상태를 사용하지 않는다. 일치하는 결과가 없더라도 유사 콘텐츠 또는 추천 콘텐츠로 대체하여 하나 이상의 결과를 항상 보여주도록 합니다."
            ]'
          ></mm-text-list>
        </div>
      </div>
      <div class="step-item">
        <span class="step-item-icon">4</span>
        <mm-text size="14" weight="bold">onSubmit (엔터 키 또는 버튼 클릭)</mm-text>
        <div class="step-item-description">
          <mm-text-list
            texts='[
              "검색 서비스 본문 결과, 전문 검색",
              "입력한 결과물 노출 또는 바로가기를 최상단에 노출",
              "일치하는 결과만 표시하고 새로운 검색을 유도"
            ]'
          ></mm-text-list>
        </div>
      </div>
    </section>

    <mm-paragraph-group>
      <mm-text size="14" weight="bold">Checklist</mm-text>
      <mm-text-list
        texts='[
          "검색의 범위. 글로벌, 로컬",
          "모바일 키보드의 높이를 고려한 쿼리의 적정 갯수",
          "결과 페이지의 공유",
          "검색 데이터의 수집",
          "최근 검색 내역 삭제. 휘발성이 높은 정보이므로 편집 모듈 없이 우측 삭제 버튼으로 개별 삭제 기능을 제공해도 충분하다.",
          "전체 검색 내역과 최근 검색 내역. 활동 로그. 검색 내역의 삭제는 개인화 콘텐츠에 영향을 주는가?",
          "tabIndex: back -> input"
        ]'
      ></mm-text-list>
    </mm-paragraph-group>
  </mm-component-guide>

  <mm-component-section title="iOS, Android 패턴">
    <style>
      .ios .searchfield-input:focus {
        width: 90%;
      }
    </style>
    <form class="searchfield ios" style="max-width: var(--width-medium)">
      <label class="searchfield-prefix">
        <mm-icon name="search"></mm-icon>
      </label>
      <input class="searchfield-input" type="search" placeholder="iOS pattern" />
      <mm-clear-button aria-label="검색어 지우기"></mm-clear-button>
      <button class="searchfield-cancel" aria-label="취소">
        <span class="material-symbols-outlined">취소</span>
      </button>
    </form>
    <form class="searchfield" style="max-width: var(--width-medium); position: relative">
      <div style="position: absolute; left: 0">
        <mm-icon-button icon="arrow-left" class="searchfield-prefix" aria-label="뒤로"></mm-icon-button>
      </div>
      <input
        class="searchfield-input"
        type="search"
        placeholder="Android pattern"
        style="padding-left: 3rem"
      />
      <div style="position: absolute; right: var(--space-3); top: var(--space-3); z-index: 1">
        <mm-clear-button aria-label="검색어 지우기"></mm-clear-button>
      </div>
    </form>
  </mm-component-section>

  <mm-component-section title="No Result" description="일치하는 결과가 없습니다.">
    <mm-result title="'[키워드]'와(과) 일치하는 내용이 없습니다.">
      <mm-button slot="action">검색어 제공</mm-button>
      <mm-button slot="action">애옹</mm-button>
    </mm-result>
  </mm-component-section>

  <mm-component-section title="Search Suggestion">
    <mm-menu-item-group class="search-suggestion" aria-label="검색 제안">
      <mm-menu-item-row icon="search" label="자동완성"></mm-menu-item-row>
      <mm-menu-item-row icon="search" label="자동완성유아이"></mm-menu-item-row>
    </mm-menu-item-group>
  </mm-component-section>

  <mm-component-references>
    <mm-link external href="https://developer.apple.com/documentation/uikit/uisearchbar">Apple Developer - searchbar</mm-link>
    <mm-link external href="https://material.io/design/navigation/search.html">MD search</mm-link>
    <mm-link external href="https://developer.android.com/reference/android/widget/SearchView">android searchview</mm-link>
  </mm-component-references>
</main>
