<main class="page">
  <mm-title-with-description
    title="Switch"
    description="켜고 끄는 옵션입니다. 사용자는 실행한 옵션의 결과를 즉시 확인할 수 있습니다."
  ></mm-title-with-description>

  <!-- A switch is a visual toggle between two mutually exclusive states — on and off.  -->

  <dl class="article-aka">
    <dt>a.k.a.</dt>
    <dd>Toggle</dd>
  </dl>

  <section class="component-example">
    <mm-switch name="newsletter">뉴스레터 받아보기</mm-switch>
    <div style="height: var(--space-3)"></div>
    <mm-switch name="newsletter" checked disabled>Receive weekly newsletter</mm-switch>
  </section>

  <section class="component-props">
    <mm-text variant="subhead">Props</mm-text>
    <dl>
      <dt>label?</dt>
      <dd>string</dd>
      <dt>name</dt>
      <dd>string</dd>
      <dt>checked</dt>
      <dd>boolean</dd>
      <dt>isDisabled<attr>?</attr></dt>
      <dd>boolean</dd>
      <dt>onChange</dt>
      <dd>(event: React.ChangeEvent&lt;HTMLInputElement&gt;) => void</dd>
    </dl>
  </section>
  <section class="component-guide">
    <mm-text-list
      texts='[
          "Behavior- instantly action. 저장 버튼과 함께 제공하지 않습니다.",
          "스위치의 왼쪽과 오른쪽에 각각 레이블을 배치하여 콘텐츠를 스위칭 맥락으로 사용하지 마세요. 필터링 가능."
        ]'
    ></mm-text-list>
  </section>
</main>
