<main class="page">
  <mm-page-header
    title="Switch"
    description="켜고 끄는 옵션입니다. 사용자는 실행한 옵션의 결과를 즉시 확인할 수 있습니다."
  ></mm-page-header>

  <!-- A switch is a visual toggle between two mutually exclusive states — on and off.  -->

  <mm-component-aka items='["Toggle"]'></mm-component-aka>

  <mm-component-example>
    <mm-switch name="newsletter">뉴스레터 받아보기</mm-switch>
    <div style="height: var(--space-3)"></div>
    <mm-switch name="newsletter" checked disabled>Receive weekly newsletter</mm-switch>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="name" type="string" optional></mm-prop>
    <mm-prop name="size" type="string" optional></mm-prop>
    <mm-prop name="checked" type="boolean" optional></mm-prop>
    <mm-prop name="disabled" type="boolean" optional></mm-prop>
    <mm-prop name="change" type="CustomEvent detail: checked, value" kind="event"></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="--switch-width" default="2rem"></mm-token>
    <mm-token name="--switch-height" default="16px"></mm-token>
    <mm-token name="--switch-radius" default="var(--radius)"></mm-token>
    <mm-token name="--switch-color" default="var(--gray200)"></mm-token>
    <mm-token name="--switch-color-checked" default="var(--color-primary)"></mm-token>
  </mm-component-tokens>

  <mm-component-anatomy
    parts='[
      "트랙 — on/off 상태를 배경색으로 나타내는 가로 막대입니다.",
      "썸(Thumb) — 트랙 위를 좌우로 이동하며 상태를 나타내는 손잡이.",
      "레이블 — 설정 항목을 설명하는 텍스트."
    ]'
  >
    <div style="position: relative; display: inline-block">
      <mm-switch checked>뉴스레터 받아보기</mm-switch>

      <!-- 번호 마커 -->
      <span style="position: absolute; left: 0.25rem; top: -1.75rem; display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; border-radius: 50%; background: var(--color-foreground); color: var(--color-background); font-size: var(--font-size-12); font-weight: var(--font-weight-bold)">1</span>
      <span style="position: absolute; left: 1.25rem; bottom: -1.75rem; transform: translateX(-50%); display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; border-radius: 50%; background: var(--color-primary); color: var(--color-background); font-size: var(--font-size-12); font-weight: var(--font-weight-bold)">2</span>
      <span style="position: absolute; right: -1.75rem; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; border-radius: 50%; background: var(--color-foreground); color: var(--color-background); font-size: var(--font-size-12); font-weight: var(--font-weight-bold)">3</span>
    </div>
  </mm-component-anatomy>

  <mm-component-guide>
    <section class="feature columns-2">
      <mm-feature
        icon="on-tag"
        titleText="Behavior- instantly action"
        subtitle="Easy scanning"
        description="저장 버튼과 함께 제공하지 않습니다. 스위치의 왼쪽과 오른쪽에 각각 레이블을 배치하여 콘텐츠를 스위칭하거나 콘텐츠를 필터링하는 맥락으로 사용하지 마세요."
      >
      </mm-feature>
    </mm-component-guide>
  </section>
</main>
