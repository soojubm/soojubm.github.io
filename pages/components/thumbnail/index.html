<main class="page">
  <mm-page-header
    heading="Thumbnail"
    description="이미지나 미디어를 정해진 비율 안에서 미리 보여줍니다. 콘텐츠의 성격을 빠르게 알아볼 수 있어야 하며, 장식 목적의 반복 사용은 피합니다."
  ></mm-page-header>

  <mm-component-example>
    <div
      style="
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: var(--space-4);
        align-items: start;
      "
    >
      <div>
        <mm-paragraph>1:1</mm-paragraph>
        <div style="height: var(--space-2)"></div>
        <mm-thumbnail src="/src/images/temp.png" alt="멋진 풍경" ratio="1:1"></mm-thumbnail>
      </div>
      <div>
        <mm-paragraph>4:3</mm-paragraph>
        <div style="height: var(--space-2)"></div>
        <mm-thumbnail
          src="/src/images/temp.png"
          alt="멋진 풍경"
          ratio="4:3"
          href="/video/1025"
        ></mm-thumbnail>
      </div>
      <div>
        <mm-paragraph>16:9</mm-paragraph>
        <div style="height: var(--space-2)"></div>
        <mm-thumbnail src="/src/images/temp.png" alt="멋진 풍경" ratio="16:9"></mm-thumbnail>
      </div>
      <div>
        <mm-paragraph>full</mm-paragraph>
        <div style="height: var(--space-2)"></div>
        <mm-thumbnail src="/src/images/temp.png" alt="멋진 풍경" ratio="full"></mm-thumbnail>
      </div>
    </div>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="src" type="string"></mm-prop>
    <mm-prop name="alt" type="string"></mm-prop>
    <mm-prop name="ratio" type="'1:1' | '16:9' | '4:3' | 'full' = '16:9'" optional></mm-prop>
    <mm-prop name="caption" type="string" optional></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="thumbnail-border-radius" default="var(--radius-large)"></mm-token>
  </mm-component-tokens>

  <mm-component-guide>
    <mm-component-feature-list>
      <mm-feature
        heading="Representative"
        description="콘텐츠 본문 대신 그 성격을 대표하는 미리보기 이미지를 보여줍니다. 무엇에 대한 콘텐츠인지 한눈에 알아볼 수 있어야 합니다."
      ></mm-feature>
      <mm-feature
        heading="Fallback"
        description="이미지를 불러오지 못하거나 비어 있어도 빈 상태 배경(thumbnail-color-empty)으로 비율과 형태를 유지합니다. alt 텍스트를 반드시 제공하세요."
      ></mm-feature>
    </mm-component-feature-list>
    <mm-paragraph>TODO 고해상도 디바이스를 위한 이미지 가이드.</mm-paragraph>
  </mm-component-guide>
</main>
