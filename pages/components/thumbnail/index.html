<main class="page">
  <mm-page-header
    heading="Thumbnail"
    description="선으로 콘텐츠를 구획합니다. 반복과 대비가 구획되었다는 인상을 주기 때문에 남용하지 않습니다."
  ></mm-page-header>

  <mm-component-example>
    <div
      style="
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: var(--space-4);
        align-items: start;
      "
    >
      <div>
        <mm-paragraph weight="bold">1:1</mm-paragraph>
        <div style="height: var(--space-2)"></div>
        <mm-thumbnail src="/src/images/temp.png" alt="멋진 풍경" ratio="1:1"></mm-thumbnail>
      </div>
      <div>
        <mm-paragraph weight="bold">4:3</mm-paragraph>
        <div style="height: var(--space-2)"></div>
        <mm-thumbnail
          src="/src/images/temp.png"
          alt="멋진 풍경"
          ratio="4:3"
          href="/video/1025"
        ></mm-thumbnail>
      </div>
      <div>
        <mm-paragraph weight="bold">16:9</mm-paragraph>
        <div style="height: var(--space-2)"></div>
        <mm-thumbnail
          src="/src/images/temp.png"
          alt="멋진 풍경"
          ratio="16:9"
          clickable
          @click="${openModal}"
        ></mm-thumbnail>
      </div>
    </div>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="src" type="string"></mm-prop>
    <mm-prop name="alt" type="string"></mm-prop>
    <mm-prop name="ratio" type="'1:1' | '16:9' | '4:3' = '16:9'" optional></mm-prop>
    <mm-prop name="caption" type="string" optional></mm-prop>
    <mm-prop name="clickable" type="boolean" optional></mm-prop>
    <mm-prop name="@click" type="(e: MouseEvent) => void" kind="event" optional></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="thumbnail-radius" default="12px"></mm-token>
    <mm-token name="thumbnail-color-empty" default="var(--color-background-subtle)"></mm-token>
  </mm-component-tokens>

  <mm-component-guide>
    <mm-paragraph>TODO 고해상도 디바이스를 위한 이미지 가이드.</mm-paragraph>
  </mm-component-guide>
</main>
