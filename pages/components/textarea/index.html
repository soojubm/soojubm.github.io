<main class="page">
  <mm-page-header title="Textarea" description="long content field"></mm-page-header>

  <mm-component-example>
    <div style="max-width: 400px">
      <mm-textarea
        label="Textarea"
        placeholder="Textarea Placeholder... rows는 기본값"
      ></mm-textarea>
      <small class="textfield-byte"><b>0</b> / 100</small>
    </div>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="value" type="string" optional></mm-prop>
    <mm-prop name="name" type="string" optional></mm-prop>
    <mm-prop name="placeholder" type="string" optional></mm-prop>
    <mm-prop name="label" type="string" optional></mm-prop>
    <mm-prop name="helper" type="string" optional></mm-prop>
    <mm-prop name="is-optional" type="boolean" optional></mm-prop>
    <mm-prop name="hidden-label" type="boolean" optional></mm-prop>
    <mm-prop name="disabled" type="boolean" optional></mm-prop>
    <mm-prop name="aria-invalid" type="boolean" optional></mm-prop>
    <mm-prop name="input" type="CustomEvent detail: value" kind="event"></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="--textfield-height" default="var(--size-large)"></mm-token>
    <mm-token
      name="--textfield-background-color"
      default="var(--color-background-subtle)"
    ></mm-token>
    <mm-token name="--textfield-border" default="var(--border)"></mm-token>
    <mm-token name="--textfield-radius" default="var(--radius)"></mm-token>
    <mm-token name="--textfield-color-border-hover" default="var(--gray400)"></mm-token>
    <mm-token name="--textfield-text-color" default="var(--color-foreground)"></mm-token>
  </mm-component-tokens>

  <!-- <mm-component-guide></mm-component-guide> -->

  <mm-component-section title="Comment Input" description="댓글 작성 입력 패턴">
    <div style="max-width: 480px">
      <mm-comment-input
        placeholder="무슨 생각을 하고 계신가요?"
        submit-label="댓글 게시"
      ></mm-comment-input>
    </div>
  </mm-component-section>
  <mm-component-section title="Prompt Input" description="TODO">
    <mm-prompt-input>
      <mm-prompt-input-textarea placeholder="Ask me anything..."></mm-prompt-input-textarea>
      <mm-textfield-action-bar align="end">
        <mm-icon-button variant="primary" icon="arrow-up" aria-label="전송"></mm-icon-button>
      </mm-textfield-action-bar>
    </mm-prompt-input>
  </mm-component-section>
</main>
