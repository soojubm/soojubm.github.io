<main class="page js-tab">
  <mm-title-with-description
    title="Icon Button"
    description="레이블 없이 메타포 아이콘만 사용하는 간결한 액션 버튼입니다. 사용자에게 툴팁으로 버튼의 용도를 명확히 전달합니다."
  ></mm-title-with-description>

  <section class="component-example">
    <mm-group>
      <mm-icon-button variant="primary" icon="arrow-right"></mm-icon-button>
      <mm-icon-button variant="primary" icon="arrow-up"></mm-icon-button>
      <mm-icon-button variant="primary" size="small" icon="arrow-right"></mm-icon-button>
      <mm-icon-button variant="primary" size="small" icon="arrow-up"></mm-icon-button>
    </mm-group>
    <mm-separator></mm-separator>
    <div style="display: flex; align-items: center; gap: var(--space-2)">
      <mm-icon-button variant="" icon="heart"></mm-icon-button>
      <mm-tooltip content="로그인">
        <mm-icon-button slot="trigger" icon="user"></mm-icon-button>
      </mm-tooltip>
      <mm-icon-button variant="" icon="star-solid"></mm-icon-button>
      <mm-icon-button variant="" icon="star"></mm-icon-button>
    </div>
    <mm-separator></mm-separator>
    <mm-group>
      <mm-icon-button variant="navigator" icon="arrow-left"></mm-icon-button>
      <mm-icon-button variant="navigator" icon="arrow-right" color="gold"></mm-icon-button>
      <mm-icon-button variant="navigator" icon="xmark"></mm-icon-button>
      <mm-clear-button></mm-clear-button>
    </mm-group>
  </section>
  <section class="component-props">
    <dl>
      <dt>name</dt>
      <dd>iconNameType</dd>
      <dt>variant</dt>
      <dd>'primary' | 'action' | 'navigator'</dd>
      <dt>size</dt>
      <dd>'small' | 'medium'</dd>
      <dt>ariaLabel</dt>
      <dd>string</dd>
      <dt>onClick</dt>
      <dd>event:(React.MouseEvent&lt;HTMLButtonElement&gt;) => void</dd>
    </dl>
    <!-- <mm-text variant="body">
      버튼으로 아이콘 버튼을 대체하기 어렵다. 레이블과 함께 사용될 때 내부 간격의 조절이 불가피하다.
      아이콘 버튼은 레이블 대신 대체 텍스트나 툴팁을 제공해야 하는데 옵셔널한 값으로 버튼의 책임이
      불필요하게 커질 수 있다.
    </mm-text>
    <mm-text variant="body"
      >Toggled states. Buttons can swap icons based on data states. There are several icons within
      our library that have a “Filled” counterpart to indicate whether a state is toggled on. The
      “Outlined” version indicates it is toggled off.
    </mm-text> -->
  </section>

  <section class="component-guide">
    <mm-text-list
      texts='[
        "아이콘 컴포넌트를 합성하는 버튼 컴포넌트",
        "액션 아이콘 버튼과 내비게이터 아이콘 버튼의 구별",
        "indicator TODO 타일 내부에서 우측에 화살표로 강조되어 있는. + expandable",
        "icon-indicator (textfield-check/select indicator) - inline or float: right"
      ]'
    ></mm-text-list>
  </section>

  <mm-component-section title="MoreMenuButton, ActionMenuButton, ContextMenuButton">
  </mm-component-section>
  <mm-component-section
    title="Icon Indicator"
    description="링크, 펼침/숨김, 시트오픈 등에서 사용하는 아이콘. 직접적인 클릭 영역을 표현하는 것이 아니라 보조적인 시각 요소로 사용됩니다."
  >
  </mm-component-section>
</main>
