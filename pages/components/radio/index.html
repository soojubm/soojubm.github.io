<main class="page">
  <mm-page-header
    title="RadioGroup"
    description="옵션 목록에서 하나의 옵션을 선택합니다."
  ></mm-page-header>

  <mm-component-example>
    <fieldset role="radiogroup" style="max-width: 640px">
      <mm-radio-group id="plan-group" name="membership" value="premium">
        <mm-radio value="basic">베이직 요금제</mm-radio>
        <mm-radio value="premium">프리미엄 요금제</mm-radio>
        <mm-radio value="ultimate" disabled>얼티메이트 요금제</mm-radio>
      </mm-radio-group>
    </fieldset>
  </mm-component-example>
  <mm-component-props>
    <mm-prop name="name" type="string" optional></mm-prop>
    <mm-prop name="value" type="string" optional></mm-prop>
    <mm-prop name="checked" type="boolean" optional></mm-prop>
    <mm-prop name="disabled" type="boolean" optional></mm-prop>
    <mm-prop name="change" type="CustomEvent detail: checked, value" kind="event"></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="--radio-size" default="var(--size-tiny)"></mm-token>
    <mm-token name="--radio-color" default="var(--color-border-strong)"></mm-token>
    <mm-token name="--radio-border" default="1px solid var(--radio-color)"></mm-token>
    <mm-token name="--radio-radius" default="50%"></mm-token>
    <mm-token name="--radio-color-checked" default="var(--color-primary)"></mm-token>
  </mm-component-tokens>

  <mm-component-anatomy
    parts='[
      "컨트롤(인디케이터) — 선택 여부를 나타내는 원형 버튼입니다.",
      "선택 표식 — 선택 시 원 안에 채워지는 점(dot).",
      "레이블 — 선택지를 설명하는 클릭 가능한 텍스트."
    ]'
  >
    <div style="position: relative; display: inline-block">
      <mm-radio value="premium" checked>프리미엄 요금제</mm-radio>

      <!-- 번호 마커 -->
      <span style="position: absolute; left: -1.75rem; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; border-radius: 50%; background: var(--color-foreground); color: var(--color-background); font-size: var(--font-size-12); font-weight: var(--font-weight-bold)">1</span>
      <span style="position: absolute; left: 0.45rem; bottom: -1.75rem; transform: translateX(-50%); display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; border-radius: 50%; background: var(--color-primary); color: var(--color-background); font-size: var(--font-size-12); font-weight: var(--font-weight-bold)">2</span>
      <span style="position: absolute; right: -1.75rem; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; border-radius: 50%; background: var(--color-foreground); color: var(--color-background); font-size: var(--font-size-12); font-weight: var(--font-weight-bold)">3</span>
    </div>
  </mm-component-anatomy>

  <mm-component-guide>
    <section class="feature columns-2">
      <mm-feature
        icon="interactive"
        titleText="Interactive - choice"
        subtitle="Easy scanning"
        description="미리 선택된 기본값을 제공하는 것은 편향된 데이터를 수집할 위험이 있습니다. 만약 미리 선택된 값을 적용하는 경우 첫 번째 옵션을 기본 옵션으로."
      >
      </mm-feature>
      <mm-feature
        icon="task-list"
        titleText="Easy scanning"
        subtitle="Easy scanning"
        description="수직 정렬로 옵션 목록을 쉽게 스킨할 수 있도록 합니다. 최대 5개의 옵션을 제공할 수 있으며, 그 이상의 옵션이 필요하다면 셀렉트Select 또는 가로 스크롤되는 칩Chip으로 제공하세요."
      >
      </mm-feature>
    </mm-component-guide>
  </section>

  <mm-component-section title="Access 권한" description="TODO">
    <div>
      <mm-top-bar label="공개 대상 선택"></mm-top-bar>
      <br />
      <mm-menu-item-radio-group name="access" value="public">
        <mm-menu-item-radio
          icon="group"
          label="전체공개"
          description="모든 Facebook 사용자"
          value="public"
        ></mm-menu-item-radio>
        <mm-menu-item-radio
          icon="group"
          label="친구만"
          description="회원님의 Facebook 친구"
          value="friends"
        ></mm-menu-item-radio>
        <mm-menu-item-radio
          icon="lock"
          label="나만 보기"
          description="부끄러우니까 보지마요"
          value="private"
        ></mm-menu-item-radio>
      </mm-menu-item-radio-group>
    </div>
  </mm-component-section>
  <mm-component-section title="Tile Radio?" description="TODO">
    <mm-surface variant="elevated" style="width: 100%">
      <mm-radio name="gender" id="option1" value="">
        <mm-text size="14" color="var(--color-foreground-light)">Standard License</mm-text>
        <mm-text size="14" weight="bold">₩ 2,000</mm-text>
        <div style="height: var(--space-2)"></div>
        <mm-tag>460P 적립</mm-tag>
      </mm-radio>
    </mm-surface>
  </mm-component-section>
</main>
