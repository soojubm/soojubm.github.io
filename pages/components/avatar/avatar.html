<main class="page">
  <mm-page-header
    title="Avatar"
    description="사용자나 회사 등 개체를 대표하는 시각 정보입니다. 정보 더미의 주체로서 인접한 정보 더미 중 최상위 위계를 갖습니다."
  ></mm-page-header>

  <mm-component-example>
    <mm-flex>
      <mm-avatar variant="primary" size="medium" shape="circle"></mm-avatar>
      <mm-avatar variant="secondary" size="medium" shape="circle"></mm-avatar>
      <mm-avatar variant="tertiary" size="medium" shape="circle"></mm-avatar>
      <mm-avatar variant="primary" size="medium"></mm-avatar>
      <mm-avatar variant="secondary" size="medium"></mm-avatar>
      <mm-avatar variant="tertiary" size="medium"></mm-avatar>
    </mm-flex>
    <mm-separator></mm-separator>
    <mm-flex>
      <mm-avatar size="huge" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="large" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="medium" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="small" src="/src/images/springsteen.jpg"></mm-avatar>
    </mm-flex>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="variant" type="'primary' | 'secondary' | 'tertiary' = 'primary'"></mm-prop>
    <mm-prop name="size" type="'huge' | 'large' | 'medium' | 'small' = 'medium'"></mm-prop>
    <mm-prop name="shape" type="'circle' | 'square' = 'square'"></mm-prop>
    <mm-prop name="src" type="string" optional></mm-prop>
    <mm-prop name="icon" type="string" optional></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="avatar-size" default="var(--size-medium)"></mm-token>
    <mm-token name="avatar-background-color" default="var(--color-background-subtle)"></mm-token>
    <mm-token name="avatar-border" default="var(--border-stronger)"></mm-token>
    <mm-token name="avatar-radius" default="var(--radius)"></mm-token>
  </mm-component-tokens>

  <mm-component-anatomy
    parts='[
      "컨테이너 — variant·size로 형태와 크기·배경을 정의합니다.",
      "콘텐츠 — 이미지 > 아이콘 > 이니셜 > 기본 아이콘 순서로 폴백합니다."
    ]'
  >
    <div style="position: relative; display: inline-block">
      <mm-avatar size="huge" variant="secondary"></mm-avatar>
      <mm-list-marker
        variant="number"
        value="1"
        style="position: absolute; left: -1.75rem; top: 50%; transform: translateY(-50%)"
      ></mm-list-marker>
      <mm-list-marker
        variant="number"
        value="2"
        style="
          position: absolute;
          left: 50%;
          top: calc(50% + 1.25rem);
          transform: translate(-50%, -50%);
        "
      ></mm-list-marker>
    </div>
  </mm-component-anatomy>

  <mm-component-guide>
    <mm-grid columns="2">
      <mm-feature
        icon="profile-circle"
        titleText="Representative"
        description="사용자, 브랜드, 혹은 특정 객체를 시각적으로 대변합니다. 이미지 프로필을 최우선으로 보여주며, 이미지가 없을 경우 이름의 이니셜이나 기본 아이콘으로 대체(Fallback)하여 고유의 정체성을 유지합니다."
      ></mm-feature>
      <mm-feature
        icon="megaphone"
        titleText="Informational"
        description="객체의 고유 데이터(식별 정보)와 유기적인 메타 데이터(상태 정보)를 결합하여, 화면 내에서 하나의 독립된 정보 노출 단위로 기능합니다."
      ></mm-feature>
    </mm-grid>
    <mm-text-list
      texts='[
        "이미지가 없을 때 이니셜·아이콘·기본 아이콘 순으로 폴백합니다. alt 텍스트 또는 aria-label을 반드시 제공하세요.",
        "shape=circle은 사람(사용자)을 나타낼 때, square는 브랜드·조직·콘텐츠에 사용합니다.",
        "size는 인접한 텍스트 위계와 맞춥니다. 18px 본문 옆에는 medium, 섹션 헤더 옆에는 large를 권장합니다."
      ]'
    ></mm-text-list>
  </mm-component-guide>

  <mm-component-section
    title="Fallback"
    description="src·icon이 없을 때 슬롯 콘텐츠 → 기본 아이콘 순으로 표시됩니다."
  >
    <mm-flex>
      <mm-avatar size="medium">MM</mm-avatar>
      <mm-avatar size="medium" icon="profile-circle"></mm-avatar>
      <mm-avatar size="medium"></mm-avatar>
    </mm-flex>
  </mm-component-section>

  <mm-component-section
    title="AvatarGroup"
    description="최대 3개를 겹쳐 표시하고 초과 인원은 숫자로 대체합니다."
  >
    <mm-avatar-group avatars='["", "", "", ""]' label="수줍이 외 3명"></mm-avatar-group>
  </mm-component-section>
</main>
