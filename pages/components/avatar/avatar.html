<main class="page">
  <mm-page-header
    heading="Avatar"
    description="사용자나 회사 등 개체를 대표하는 시각 정보입니다. 정보 더미의 주체로서 인접한 정보 더미 중 최상위 위계를 갖습니다."
  ></mm-page-header>

  <mm-component-example>
    <mm-flex gap="2">
      <mm-avatar variant="primary" size="medium" shape="circle"></mm-avatar>
      <mm-avatar variant="secondary" size="medium" shape="circle"></mm-avatar>
      <mm-avatar variant="tertiary" size="medium" shape="circle"></mm-avatar>
    </mm-flex>
    <mm-separator></mm-separator>
    <mm-flex gap="2">
      <mm-avatar variant="primary" size="medium"></mm-avatar>
      <mm-avatar variant="secondary" size="medium"></mm-avatar>
      <mm-avatar variant="tertiary" size="medium"></mm-avatar>
    </mm-flex>
    <mm-separator></mm-separator>
    <mm-flex gap="2">
      <mm-avatar size="huge" src="/src/images/soojubm.png"></mm-avatar>
      <mm-avatar size="large" src="/src/images/soojubm.png"></mm-avatar>
      <mm-avatar size="medium" src="/src/images/soojubm.png"></mm-avatar>
      <mm-avatar size="small" src="/src/images/soojubm.png"></mm-avatar>
    </mm-flex>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="variant" type="'primary' | 'secondary' | 'tertiary' = 'primary'"></mm-prop>
    <mm-prop name="size" type="'huge' | 'large' | 'medium' | 'small' = 'medium'"></mm-prop>
    <mm-prop name="shape" type="'circle' | 'square' = 'square'"></mm-prop>
    <mm-prop name="src" type="string" optional></mm-prop>
    <mm-prop name="icon" type="IconName" optional></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="avatar-size" default="var(--size-medium)"></mm-token>
    <mm-token name="avatar-background-color" default="var(--color-background-subtle)"></mm-token>
    <mm-token name="avatar-border" default="var(--border)"></mm-token>
    <mm-token name="avatar-border-radius" default="var(--radius)"></mm-token>
  </mm-component-tokens>

  <mm-component-anatomy
    parts='[
      "컨테이너 — variant·size로 형태와 크기·배경을 정의합니다.",
      "콘텐츠 — 이미지 > 아이콘 > 이니셜 > 기본 아이콘 순서로 폴백합니다."
    ]'
  >
    <div style="position: relative; display: inline-block">
      <mm-avatar size="huge" variant="secondary"></mm-avatar>
      <mm-list-marker
        variant="number"
        value="1"
        style="position: absolute; left: -1.75rem; top: 50%; transform: translateY(-50%)"
      ></mm-list-marker>
      <mm-list-marker
        variant="number"
        value="2"
        style="
          position: absolute;
          left: 50%;
          top: calc(50% + 1.25rem);
          transform: translate(-50%, -50%);
        "
      ></mm-list-marker>
    </div>
  </mm-component-anatomy>

  <mm-component-guide>
    <mm-feature-group columns="2">
      <mm-feature
        heading="Representative"
        description="사용자·브랜드·객체를 시각적으로 대변합니다. 이미지 프로필을 최우선으로 보여주며, 식별 정보에 상태 메타 데이터를 결합하면 하나의 독립된 정보 노출 단위로도 기능합니다."
      ></mm-feature>
      <mm-feature
        heading="Fallback"
        description="이미지가 없거나 로드에 실패해도 이니셜 → 아이콘 → 기본 아이콘 순으로 대체해 형태와 정체성을 유지합니다. alt 텍스트 또는 aria-label을 반드시 제공하세요."
      ></mm-feature>
      <mm-feature
        heading="Groupable"
        description="여러 아바타는 avatar-group으로 겹쳐 묶어 참여자 무리를 압축해 보여줍니다. 겹침 간격과 초과 인원 표시는 그룹이 소유합니다."
      ></mm-feature>
    </mm-feature-group>
    <mm-text-list
      texts='[
        "shape=circle은 사람(사용자)을 나타낼 때, square는 브랜드·조직·콘텐츠에 사용합니다."
      ]'
    ></mm-text-list>
  </mm-component-guide>

  <mm-component-section
    heading="Fallback"
    description="src·icon이 없을 때 슬롯 콘텐츠 → 기본 아이콘 순으로 표시됩니다."
  >
    <mm-flex gap="2">
      <mm-avatar size="medium">MM</mm-avatar>
      <mm-avatar size="medium" icon="profile-circle"></mm-avatar>
      <mm-avatar size="medium"></mm-avatar>
    </mm-flex>
  </mm-component-section>

  <mm-component-section
    heading="AvatarGroup"
    description="최대 3개를 겹쳐 표시하고 초과 인원은 숫자로 대체합니다."
  >
    <mm-avatar-group avatars='["", "", "", ""]' label="수줍이 외 3명"></mm-avatar-group>
  </mm-component-section>
</main>
