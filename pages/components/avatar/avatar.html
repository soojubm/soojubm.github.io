<main class="page">
  <mm-page-header
    title="Avatar"
    description="사용자나 회사 등 개체를 대표하는 시각 정보입니다. 정보 더미의 주체로서 인접한 정보
  더미 중 최상위 위계를 갖습니다."
  ></mm-page-header>

  <mm-component-example>
    <mm-group variant="">
      <mm-avatar variant="primary" size="large" shape="circle"></mm-avatar>
      <mm-avatar variant="primary" size="large"></mm-avatar>
      <mm-avatar variant="secondary" size="large"></mm-avatar>
      <mm-avatar variant="tertiary" size="large"></mm-avatar>
    </mm-group>
    <mm-separator></mm-separator>
    <mm-group variant="">
      <mm-avatar size="huge" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="large" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="medium" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="small" src="/src/images/springsteen.jpg"></mm-avatar>
    </mm-group>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="src" type="string"></mm-prop>
    <mm-prop name="icon" type="string"></mm-prop>
    <mm-prop name="size" type="'huge' | 'large' | 'medium' | 'small' = 'medium'"></mm-prop>
    <mm-prop name="variant" type="'primary' | 'secondary' | 'tertiary' = 'primary'"></mm-prop>
    <mm-prop name="shape" type="'circle' | 'square' = 'square'"></mm-prop>
  </mm-component-props>

  <mm-component-anatomy
    parts='[
      "컨테이너 — 원형/사각형 형태와 크기·배경(variant)을 정의합니다.",
      "콘텐츠 — 이미지, 아이콘, 이니셜 중 하나를 우선순위에 따라 표시합니다."
    ]'
  >
    <div style="position: relative; display: inline-block">
      <mm-avatar size="huge" variant="secondary"></mm-avatar>

      <!-- 번호 마커 -->
      <span style="position: absolute; left: -1.75rem; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; border-radius: 50%; background: var(--color-foreground); color: var(--color-background); font-size: var(--font-size-12); font-weight: var(--font-weight-bold)">1</span>
      <span style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: inline-flex; align-items: center; justify-content: center; width: 1.25rem; height: 1.25rem; border-radius: 50%; background: var(--color-foreground); color: var(--color-background); font-size: var(--font-size-12); font-weight: var(--font-weight-bold)">2</span>
    </div>
  </mm-component-anatomy>

  <mm-component-guide>
    <section class="feature columns-2">
      <mm-feature
        icon="cursor-pointer"
        titleText="Representative"
        description="사용자, 브랜드, 혹은 특정 객체를 시각적으로 대변합니다. 이미지 프로필을 최우선으로 보여주며, 이미지가 없을 경우 이름의 이니셜이나 기본 아이콘으로 대체(Fallback)하여 고유의 정체성을 유지합니다."
      >
      </mm-feature>
      <mm-feature
        icon="cursor-pointer"
        titleText="Informational"
        description="객체의 고유 데이터(식별 정보)와 유기적인 메타 데이터(상태 정보)를 결합하여, 화면 내에서 하나의 독립된 정보 노출 단위로 기능합니다."
      >
      </mm-feature>
    </mm-component-guide>

    <mm-group>
      <mm-avatar size="medium">MM</mm-avatar>
      <mm-avatar size="medium" icon="profile-circle"></mm-avatar>

  <mm-component-section title="AvatarGroup" description="maximum avatar length 3">
    <mm-group variant="avatar">
      <mm-avatar size="medium" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="medium" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="medium" src="/src/images/springsteen.jpg"></mm-avatar>
    </mm-group>
