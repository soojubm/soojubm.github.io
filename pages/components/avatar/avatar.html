<main class="page">
  <mm-title-with-description
    title="Avatar"
    description="사용자나 회사 등 개체를 대표하는 시각 정보입니다. 정보 더미의 주체로서 인접한 정보
  더미 중 최상위 위계를 갖습니다."
  ></mm-title-with-description>

  <section class="component-example">
    <mm-group variant="">
      <mm-avatar variant="primary" size="large" badge="true"></mm-avatar>
      <mm-avatar variant="secondary" size="large" badge="true"></mm-avatar>
      <mm-avatar variant="tertiary" size="large" badge="true"></mm-avatar>
    </mm-group>
    <mm-separator></mm-separator>
    <mm-group variant="">
      <mm-avatar size="huge" src="/src/images/springsteen.jpg"></mm-avatar>
      <!-- <mm-avatar size="huge" src="/src/images/springsteen.jpg" badge-label="New"></mm-avatar> -->
      <mm-avatar size="large" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="medium" src="/src/images/springsteen.jpg"></mm-avatar>
      <mm-avatar size="small" src="/src/images/springsteen.jpg"></mm-avatar>
    </mm-group>
  </section>

  <mm-component-props>
    <mm-prop name="src" type="string"></mm-prop>
    <mm-prop name="alt" type="string"></mm-prop>
    <mm-prop name="ratio" type="'1:1' | '16:9' | '4:3' = '1:1'"></mm-prop>
    <mm-prop name="clickable" type="boolean"></mm-prop>
    <mm-prop name="@click" type="(e: MouseEvent) => void" kind="event"></mm-prop>
  </mm-component-props>

  <section class="component-guide">
    <section class="feature columns-2">
      <mm-feature
        icon="cursor-pointer"
        titleText="Representative"
        description="사용자, 브랜드, 혹은 특정 객체를 시각적으로 대변합니다. 이미지 프로필을 최우선으로 보여주며, 이미지가 없을 경우 이름의 이니셜이나 기본 아이콘으로 대체(Fallback)하여 고유의 정체성을 유지합니다."
      >
      </mm-feature>
      <mm-feature
        icon="cursor-pointer"
        titleText="Informational"
        description="객체의 고유 데이터(식별 정보)와 유기적인 메타 데이터(상태 정보)를 결합하여, 화면 내에서 하나의 독립된 정보 노출 단위로 기능합니다."
      >
      </mm-feature>
    </section>

    <mm-group variant="avatar">

      <mm-avatar size="medium" src="/src/images/springsteen.jpg"></mm-avatar>
