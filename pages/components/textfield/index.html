    .test {
      position: relative;
    }
    .test:after {
      animation: spinAround 0.5s linear infinite;
      border-bottom: 2px solid #000;
      border-left: 2px solid #000;
      border-radius: var(--bulma-radius-rounded);
      border-right: 2px solid transparent;
      border-top: 2px solid transparent;
      content: '';
      display: block;
      height: 1em;
      position: relative;
      width: 1em;

      inset-inline-end: 0.75em;
      position: absolute !important;
      top: 0.75em;
      z-index: 4;
    }

    @keyframes spinAround {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(359deg);
      }
    }
  </style>

    It is triggered when a user interacts with a Button, Textfield or other control.

  <!-- - 콤보박스 textfield + select -->

        <mm-separator spacing="small"></mm-separator>

  <mm-component-props>
    <mm-prop name="type" type="string = 'text'"></mm-prop>
    <mm-prop name="value" type="string" optional></mm-prop>
    <mm-prop name="name" type="string" optional></mm-prop>
    <mm-prop name="placeholder" type="string" optional></mm-prop>
    <mm-prop name="label" type="string" optional></mm-prop>
    <mm-prop name="helper" type="string" optional></mm-prop>
    <mm-prop name="validation-text" type="string" optional></mm-prop>
    <mm-prop name="size" type="string" optional></mm-prop>
    <mm-prop name="is-optional" type="boolean" optional></mm-prop>
    <mm-prop name="hidden-label" type="boolean" optional></mm-prop>
    <mm-prop name="disabled" type="boolean" optional></mm-prop>
    <mm-prop name="aria-invalid" type="boolean" optional></mm-prop>
    <mm-prop name="input" type="CustomEvent detail: value" kind="event"></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="--textfield-height" default="var(--size-large)" description="입력 필드 높이 (size=small일 때 var(--size-medium))"></mm-token>
    <mm-token name="--textfield-background-color" default="var(--color-background-subtle)" description="배경색"></mm-token>
    <mm-token name="--textfield-border" default="var(--border)" description="테두리 스타일"></mm-token>
    <mm-token name="--textfield-radius" default="var(--radius)" description="모서리 반지름"></mm-token>
    <mm-token name="--textfield-color-border-hover" default="var(--gray400)" description="호버 상태 테두리 색상"></mm-token>
    <mm-token name="--textfield-text-color" default="var(--color-foreground)" description="입력 텍스트 색상"></mm-token>
  </mm-component-tokens>

    parts='[
      "레이블 — 입력 항목의 이름을 나타냅니다(label).",
      "헬퍼 텍스트 — 레이블 아래에서 입력 형식이나 보조 정보를 안내합니다(helper).",
