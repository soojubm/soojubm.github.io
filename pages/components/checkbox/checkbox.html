<main class="page">
  <mm-title-with-description
    title="Checkbox"
    description="옵션 목록에서 하나 이상의 옵션을 선택합니다."
  ></mm-title-with-description>

  <section class="component-example">
    <!-- a11y checkgroup not valid -->
    <!-- <legend">checkgroup</legend> -->
    <!-- <mm-group>
      <mm-checkbox name="checkbox" size="large" checked> 체크박스</mm-checkbox>
      <mm-checkbox name="checkbox" checked> </mm-checkbox>
    </mm-group> -->
    <mm-group variant="checkbox">
      <mm-checkbox
        name="checkbox"
        value="value"
        size="large"
        aria-helper="주로 세팅 페이지에서 사용되는 디스크립션 영역. 항상 텍스트 더미인 것은 아님. 하지만 그렇다면 expanded/collapsed 맥락이 아닐까?"
        checked
      >
        체크박스 기본
      </mm-checkbox>
      <mm-checkbox name="checkbox" size="large" disabled>체크박스 비활성</mm-checkbox>
      <mm-checkbox name="checkbox" size="large" checked disabled>체크박스 비활성 체크</mm-checkbox>
    </mm-group>
  </section>

  <section class="component-props">
    <mm-text variant="subhead">Props</mm-text>
    <dl>
      <!-- <dt>name</dt>
        <dd>string</dd>
        <dd>radio에서도 직접 입력 id={props.name}</dd> -->
      <dt>value</dt>
      <dd>string</dd>
      <dt>label?</dt>
      <dd>string</dd>
      <dt>isChecked<attr>?</attr></dt>
      <dd>boolean</dd>
      <dt>isDisabled<attr>?</attr></dt>
      <dd>boolean</dd>
      <dt>onChange</dt>
      <dd>(event: React.ChangeEvent&lt;HTMLInputElement&gt;) => void</dd>
    </dl>
  </section>

  <section class="component-guide">
    <section class="feature columns-3">
      <mm-feature
        icon="task-list"
        titleText="Interactive - choice"
        subtitle="Easy scanning"
        description="미리 선택된 기본값을 제공하는 것은 편향된 데이터를 수집할 위험이 있습니다."
      >
      </mm-feature>
      <mm-feature
        icon="task-list"
        titleText="Easy scanning"
        subtitle="Easy scanning"
        description="옵션 목록을 파악하기 쉽게 수직 정렬합니다. 레이블은 최대 2단어로 작성합니다. choice냐 action option(?)이냐. action option일 때는 동사를 포함하여 작성합니다."
      >
      </mm-feature>
      <mm-feature
        icon="task-list"
        titleText="Groupable"
        subtitle="Easy scanning"
        description="체크박스 그룹은 관련된 옵션들을 함께 묶어 사용자에게 제공할 수 있습니다. 이 경우, 그룹의 제목(legend)을 명확하게 표시하여 사용자가 옵션들의 맥락을 이해할 수 있도록 합니다."
      >
      </mm-feature>
    </section>
  </section>

  <mm-component-section
    title="MasterCheckbox / TermsCheckbox / TermsCheckboxGroup"
    description="체크박스 그룹에 대한 설명"
  >
    <div>
      <mm-tile variant="elevated" size="medium">
        <mm-checkbox
          size="large"
          class="js-checkall"
          aira-checked="mixed"
          aria-controls="1 2"
          data-indeterminate="true"
          indeterminate
        >
          <mm-text variant="heading4">모두 동의합니다 (선택동의 포함)</mm-text>
        </mm-checkbox>
      </mm-tile>
      <div style="height: var(--space-3)"></div>
      <mm-group variant="checkbox">
        <mm-row justifyContent="space-between" style="width: 100%">
          <mm-checkbox size="large" class="js-check" id="terms5" name="terms">
            이용약관 동의 (필수)
          </mm-checkbox>
          <mm-icon-button
            variant="navigator"
            size="small"
            aria-label="이용약관 바로가기"
            href="#"
            icon="arrow-up-right"
          ></mm-icon-button>
        </mm-row>
        <mm-tile variant="tinted" style="width: 100%">
          <mm-group variant="checkbox">
            <mm-checkbox
              size="small"
              class="js-checkall"
              aira-checked="mixed"
              aria-controls="1 2"
              data-indeterminate="true"
              indeterminate
            >
              성별
            </mm-checkbox>
            <mm-checkbox
              size="small"
              class="js-checkall"
              aira-checked="mixed"
              aria-controls="1 2"
              data-indeterminate="true"
              indeterminate
            >
              생년월일
            </mm-checkbox>
          </mm-group>
        </mm-tile>
        <mm-checkbox size="large" class="js-check" id="terms6" name="terms">
          개인정보 수집/이용 동의
        </mm-checkbox>
        <mm-checkbox size="large" class="js-check" id="terms7" name="terms">
          개인정보 제3자 제공 동의
        </mm-checkbox>
      </mm-group>
    </div>
  </mm-component-section>

  <mm-component-section title="Sampler" description="연습">
    <div style="width: 400px">
      <mm-titlebar variant="close" label="컬렉션에 추가" hiddenBack>
        <mm-button slot="action" variant="text">새 컬렉션</mm-button>
      </mm-titlebar>
      <div style="height: var(--space-3)"></div>
      <mm-group variant="checkbox">
        <mm-option-row primaryText="을지로 맛집" secondaryText="test">
          <mm-avatar slot="avatar" size="large" style="font-size: 1.5rem; overflow: hidden">
            💳
          </mm-avatar>
        </mm-option-row>
        <!-- <mm-menuitem label="을지로 맛집">
          <mm-avatar
            slot="avatar"
            size="large"
            fallback="💳"
            style="background: aliceblue; font-size: 1.5rem"
          ></mm-avatar>
          <mm-checkbox slot="action" name="checkbox" size=""></mm-checkbox>
        </mm-menuitem> -->
        <!-- aira-checked="mixed" aria-controls="1 2" -->
      </mm-group>
      <mm-separator></mm-separator>
      <mm-titlebar label="새 컬렉션">
        <mm-button slot="action" variant="text">완료</mm-button>
      </mm-titlebar>
      <div style="height: 1rem"></div>
      <mm-textfield label="컬렉션 이름" placeholder="컬렉션 이름"></mm-textfield>
      <div style="height: 0.75rem"></div>
      <!-- aira-checked="mixed" aria-controls="1 2" -->
      <button-list-component
        id="button-list"
        options='[
              {"label": "공개", "value": "apple"},
              {"label": "비공개", "value": "banana"}
            ]'
      ></button-list-component>
      <br />
      <mm-menuitem label="이 컬렉션에 멤버 추가">
        <mm-avatar slot="avatar" icon="plus"> </mm-avatar>
      </mm-menuitem>
      <mm-separator></mm-separator>
      <mm-titlebar label="멤버 추가">
        <mm-button slot="action" variant="text">완료</mm-button>
      </mm-titlebar>
      <div style="height: var(--space-4)"></div>
      <mm-textfield label="TODO 멤버 검색" placeholder="멤버 이름"></mm-textfield>
      <div style="height: var(--space-4)"></div>
      <ul>
        <li>추천</li>
        <li>멤버 오른쪽 체크박스</li>
      </ul>
    </div>
  </mm-component-section>
</main>
