<main class="page">
  <mm-page-header
    heading="List Item"
    description="leading(아바타·아이콘) + 본문(제목·설명) + trailing(액션) 한 줄을 구성하는 표현 전용 primitive. 상호작용 의미가 필요하면 menuItem을 사용합니다."
  ></mm-page-header>

  <mm-component-aka items='["ListTile", "Media Object"]'></mm-component-aka>

  <mm-component-example>
    <mm-flex direction="column" gap="2">
      <mm-menu-item-group>
        <mm-list-item size="32" label="32 사이즈"></mm-list-item>
        <mm-list-item
          size="32"
          label="32 사이즈"
          avatar-variant="secondary"
          avatar-src="/src/images/soojubm.png"
        ></mm-list-item>
      </mm-menu-item-group>
      <mm-separator spacing="small"></mm-separator>
      <mm-menu-item-group>
        <mm-list-item
          label="40 사이즈 / 아바타 없음"
          description="Youtube Subscriber"
        ></mm-list-item>
        <mm-list-item
          label="40 사이즈"
          description="Youtube Subscriber"
          avatar-variant="secondary"
          avatar-src="/src/images/soojubm.png"
        ></mm-list-item>
      </mm-menu-item-group>
      <mm-separator spacing="small"></mm-separator>
      <mm-list-item label="48 사이즈" description="Youtube Subscriber" size="48"></mm-list-item>
      <mm-list-item
        label="48 사이즈"
        description="Youtube Subscriber"
        size="48"
        avatar-variant="secondary"
        avatar-src="/src/images/soojubm.png"
      ></mm-list-item>
      <mm-separator spacing="small"></mm-separator>
      <mm-list-item
        label="80 사이즈 용도 없음"
        description="Youtube Subscriber"
        size="80"
        avatar-shape="circle"
        avatar-variant="secondary"
        avatar-src="/src/images/soojubm.png"
      ></mm-list-item>
    </mm-flex>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="size" type="'32' | '40' | '48' | '80' = '40'" optional></mm-prop>
    <mm-prop name="label" type="string" optional></mm-prop>
    <mm-prop name="description" type="string" optional></mm-prop>
    <mm-prop name="icon" type="IconName" optional></mm-prop>
    <mm-prop name="avatar-src" type="string" optional></mm-prop>
    <mm-prop name="avatar-variant" type="string" optional></mm-prop>
    <mm-prop name="avatar-shape" type="'circle' | 'square' = 'square'" optional></mm-prop>
    <mm-prop name="slot: default" type="HTMLElement" optional></mm-prop>
    <mm-prop name="slot: trailing" type="HTMLElement" optional></mm-prop>
  </mm-component-props>

  <mm-component-anatomy
    parts='[
      "leading — 아이콘 또는 아바타를 담는 선택적 영역. 없으면 content가 왼쪽 끝에서 시작합니다.",
      "content — label과 description으로 구성된 본문. flex: 1로 남은 공간을 채웁니다.",
      "trailing — 오른쪽에 배치되는 선택적 슬롯. 액션 버튼·뱃지·메타 텍스트 등을 넣습니다."
    ]'
  >
    <mm-list-item
      label="수줍이"
      description="바보"
      size="48"
      avatar-variant="primary"
      avatar-shape="circle"
      avatar-src="/src/images/soojubm.png"
      style="width: 100%"
    >
      <mm-follow-button slot="trailing"></mm-follow-button>
    </mm-list-item>
    <mm-list-marker
      variant="number"
      value="1"
      style="position: absolute; left: 1.25rem; bottom: -1.75rem; transform: translateX(-50%)"
    ></mm-list-marker>
    <mm-list-marker
      variant="number"
      value="2"
      style="position: absolute; left: 50%; bottom: -1.75rem; transform: translateX(-50%)"
    ></mm-list-marker>
    <mm-list-marker
      variant="number"
      value="3"
      style="position: absolute; right: 1.25rem; bottom: -1.75rem; transform: translateX(50%)"
    ></mm-list-marker>
  </mm-component-anatomy>

  <mm-component-guide>
    <mm-feature-group columns="4">
      <mm-feature
        heading="Structural"
        description="leading·content·trailing의 고정된 골격으로 반복되는 행의 구조를 잡습니다. 상호작용 없이 레이아웃만 담당하는 표현 전용 행입니다."
      ></mm-feature>
    </mm-feature-group>
  </mm-component-guide>

  <mm-component-section heading="UserRow" description="사용자 맥락">
    <mm-user-row
      label="수줍이"
      description="UI Designer"
      avatar-src="/src/images/soojubm.png"
    ></mm-user-row>
    <mm-separator></mm-separator>
    <mm-user-row label="수줍이" description="바보" avatar-src="/src/images/soojubm.png">
      <mm-follow-button slot="trailing"></mm-follow-button>
    </mm-user-row>
    <mm-separator></mm-separator>
    <mm-user-row
      label="알 수 없는 사용자"
      description="아바타 이미지가 없을 때"
      avatar-variant="secondary"
      icon="user"
    >
      <mm-tag slot="trailing">테스트용 태그</mm-tag>
    </mm-user-row>
  </mm-component-section>

  <mm-component-related>
    <mm-button-group>
      <mm-hashtag-link href="avatar.html">Avatar</mm-hashtag-link>
      <mm-hashtag-link href="menuitem.html">menuItem</mm-hashtag-link>
    </mm-button-group>
  </mm-component-related>

  <mm-component-references>
    <mm-link external href="https://developer.apple.com/documentation/SwiftUI/List">
      SwiftUI - List
    </mm-link>
    <mm-link
      external
      href="https://developer.apple.com/design/human-interface-guidelines/lists-and-tables"
    >
      HIG Lists and Tables
    </mm-link>
    <mm-link external href="https://m3.material.io/components/lists/overview">MD3 Lists</mm-link>
    <mm-link external href="https://reactnativeelements.com/docs/components/listitem">
      React Native Elements - ListItem
    </mm-link>
    <mm-link external href="https://api.flutter.dev/flutter/material/ListTile-class.html">
      Flutter - ListTile
    </mm-link>
  </mm-component-references>
</main>
