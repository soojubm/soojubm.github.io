<main class="page">
  <mm-page-header
    heading="Bottom Bar"
    description="작은 화면 하단에서 주요 목적지 사이를 이동하는 내비게이션입니다."
  ></mm-page-header>

  <mm-component-example>
    <mm-bottom-bar
      items='[
          { "label": "홈", "href": "#", "icon": "home-simple-door", "active": true },
          { "label": "검색", "href": "#", "icon": "search", "badge": true },
          { "label": "설정", "href": "#", "icon": "settings" }
        ]'
    ></mm-bottom-bar>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="items" type="JSON string" optional></mm-prop>
    <mm-prop name="label" type="string = '하단 내비게이션'" optional></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token
      name="bottom-bar-item-height"
      default="calc(var(--size-32) + var(--font-line-height-24))"
    ></mm-token>
  </mm-component-tokens>

  <mm-component-guide>
    <mm-component-feature-list>
      <mm-feature
        heading="Persistent"
        description="화면 이동과 스크롤에도 하단에 자리를 지켜 주요 목적지로 언제든 이동할 수 있습니다."
      ></mm-feature>
    </mm-component-feature-list>
  </mm-component-guide>
  <mm-component-related>
    <mm-button-group>
      <mm-hashtag-link href="top-bar.html">Top Bar</mm-hashtag-link>
      <mm-hashtag-link href="tabs.html">Tabs</mm-hashtag-link>
    </mm-button-group>
  </mm-component-related>
</main>
