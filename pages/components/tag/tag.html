<main class="page">
  <mm-page-header
    title="Tag"
    description="인접 요소나 부모 요소를 부연하는 시각 정보입니다. 상태, 카테고리, 키워드로 강조된 시각 정보는 사용자가 복잡한 정보 더미에서 중요한 정보를 우선적으로 파악하도록 돕습니다."
  ></mm-page-header>
  <!-- "아바타, 바텀 네비게이션, 탭에서 일관되게 사용되는가?" -->

  <!-- Badge intent="info" -->
  <mm-component-aka items='["Badge", "Label", "Keyword", "Flag", "activity bar counter (vs code)", "Counter badge (quantity)", "Health", "Status Pill"]'></mm-component-aka>

  <mm-component-example>
    <mm-group>
      <!-- primitive -->
      <mm-tag tone="gray"> gray </mm-tag>
      <mm-tag tone="green"> green </mm-tag>
      <mm-tag tone="yellow"> yellow </mm-tag>
      <mm-tag tone="red"> red </mm-tag>
      <mm-tag tone="blue"> blue </mm-tag>
      <mm-tag tone="purple"> purple </mm-tag>
      <mm-tag tone="pink"> pink </mm-tag>
      <mm-tag tone="orange"> orange </mm-tag>
      <mm-tag tone="cyan"> cyan </mm-tag>
    </mm-group>
  </mm-component-example>

  <mm-component-props>
    <mm-prop name="tone" type="'gray' | 'green' | 'yellow' | 'red' | 'blue' | 'purple' | 'pink' | 'orange' | 'cyan' = 'gray'"></mm-prop>
    <mm-prop name="slot: icon" type="HTMLElement" optional></mm-prop>
  </mm-component-props>

  <mm-component-guide>
    <section class="feature columns-2">
      <mm-feature
        icon="cursor-pointer"
        titleText="Glanceable"
        subtitle="notification, status, informational"
        description="컬러와 아이콘 등의 시각적 요소를 활용하여 시스템의 상태(Status)나 긴급도를 사용자가 화면을 훑는 것만으로도 한눈에 파악할 수 있게 합니다. (e.g., 진행 중, 승인 대기, 위험)"
      >
      </mm-feature>
      <mm-feature
        icon="task-list"
        titleText="Categorical"
        description="방대한 데이터 속에서 콘텐츠의 분류(Category)나 공통 속성(Property)을 명확하게 묶어 화면을 구조화하고, 사용자가 원하는 정보를 빠르게 탐색하도록 돕습니다. (e.g., 부서명, 기획전, 문서 유형)"
      >
      </mm-feature>
      <mm-feature
        icon="cube-scan"
        titleText="Informational"
        description="클릭이나 삭제 등의 별도 인터랙션(Non-interactive) 없이, 객체의 부가적인 속성이나 메타 정보를 읽기 전용(Read-only) 형태로 안전하고 콤팩트하게 전달합니다. (e.g., 배송비 무료, NEW, 추천)"
      >
      </mm-feature>
    </mm-component-guide>

  </section>
  <mm-component-section
    title="Dot badge"
    description="Live badge, New badge, Unread badge.A dot badge notifies the user that something is new or updated without showing a count."
  >
    <div>
      <style>
        .dot-badge {
          display: inline-flex;
          width: 0.5rem;
          height: 0.5rem;
          margin-right: var(--space-2);
          background: crimson;
          border-radius: 50%;
        }
      </style>
      <em class="dot-badge"></em>
    </div>
  </mm-component-section>

  <mm-component-section title="MostPopularTag" description="구체 레벨. 가장 인기있는 태그">
    <mm-tag>🔥 Most Popular</mm-tag>
  </mm-component-section>

  <mm-component-section title="KeywordTag" description="">
    <mm-group>
      <mm-status-tag variant="neutral"> keyword1 </mm-status-tag>
      <mm-status-tag variant="neutral"> keyword2 </mm-status-tag>
      <mm-status-tag variant="neutral"> keyword3 </mm-status-tag>
    </mm-group>
  </mm-component-section>

  <mm-component-section title="AccentTag" description="TODO accent color">
    <mm-group>
      <mm-accent-tag> Featured </mm-accent-tag>
    </mm-group>
  </mm-component-section>

  <mm-component-section title="CategoryTag" description="">
    <mm-group variant="tag">
      <mm-category-tag category="music"> Jazz </mm-category-tag>
      <mm-category-tag category="finance"> Stocks </mm-category-tag>
      <mm-category-tag category="design"> UI Design </mm-category-tag>
      <mm-category-tag category="engineering"> Frontend </mm-category-tag>
      <mm-category-tag category="marketing"> Branding </mm-category-tag>
      <mm-category-tag category="news"> Breaking </mm-category-tag>
      <mm-category-tag category="lifestyle"> Wellness </mm-category-tag>
      <mm-category-tag category="sports">
        <mm-icon slot="icon" name="graph-up"></mm-icon> Football
      </mm-category-tag>
    </mm-group>
  </mm-component-section>

  <mm-component-section title="StatusTag" description="">
    <mm-group>
      <mm-status-tag variant="neutral"> neutral </mm-status-tag>
      <mm-status-tag variant="success"> success </mm-status-tag>
      <mm-status-tag variant="warning"> warning </mm-status-tag>
      <mm-status-tag variant="error"> error </mm-status-tag>
      <mm-status-tag variant="info"> info </mm-status-tag>
    </mm-group>
  </mm-component-section>
</main>
