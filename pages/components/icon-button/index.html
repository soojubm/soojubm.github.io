<main class="page js-tab">
  <mm-page-header
    title="Icon Button"
    description="레이블 없이 메타포 아이콘만 사용하는 간결한 액션 버튼입니다. 사용자에게 툴팁으로 버튼의 용도를 명확히 전달합니다."
  ></mm-page-header>

  <mm-component-example>
    <mm-group>
      <mm-icon-button variant="primary" icon="arrow-right"></mm-icon-button>
      <mm-icon-button variant="primary" icon="arrow-up"></mm-icon-button>
      <mm-icon-button variant="primary" size="small" icon="arrow-right"></mm-icon-button>
      <mm-icon-button variant="primary" size="small" icon="arrow-up"></mm-icon-button>
    </mm-group>
    <mm-separator></mm-separator>
    <div style="display: flex; align-items: center; gap: var(--space-2)">
      <mm-icon-button variant="" icon="heart"></mm-icon-button>
      <mm-tooltip content="로그인">
        <mm-icon-button slot="trigger" icon="user"></mm-icon-button>
      </mm-tooltip>
      <mm-icon-button variant="" icon="star-solid"></mm-icon-button>
      <mm-icon-button variant="" icon="star"></mm-icon-button>
    </div>
    <mm-separator></mm-separator>
    <mm-group>
      <mm-icon-button variant="navigator" icon="arrow-left"></mm-icon-button>
      <mm-icon-button variant="navigator" icon="arrow-right" color="gold"></mm-icon-button>
    </mm-group>
  </mm-component-example>
  <mm-component-props>
    <mm-prop name="src" type="string"></mm-prop>
    <mm-prop name="alt" type="string"></mm-prop>
    <mm-prop name="ratio" type="'1:1' | '16:9' | '4:3' = '1:1'"></mm-prop>
    <mm-prop name="clickable" type="boolean"></mm-prop>
    <mm-prop name="@click" type="(e: MouseEvent) => void" kind="event"></mm-prop>
  </mm-component-props>

  <mm-component-guide>
    <mm-text size="14">
      Toggled states. Buttons can swap icons based on data states.
      <br />
      There are several icons within our library that have a “Filled” counterpart to indicate
      whether a state is toggled on. The “Outlined” version indicates it is toggled off.
    </mm-text>
  </mm-component-guide>

  <mm-component-section title="MoreMenuButton, ActionMenuButton, ContextMenuButton">
    <mm-icon-button variant="navigator" icon="more-vert"></mm-icon-button>
  </mm-component-section>

  <mm-component-section title="Close Button" description="모달, 패널, 시트 등 레이어를 닫는 버튼. navigator 스타일 — 원형, 테두리, 그림자.">
    <div style="display: flex; align-items: center; gap: var(--space-4)">
      <mm-close-button></mm-close-button>
      <mm-close-button aria-label="창 닫기"></mm-close-button>
    </div>
  </mm-component-section>

  <mm-component-section title="Dismiss Button" description="배너, 알림, 토스트 등 비파괴적 해제 버튼. plain 스타일 — 배경 없음, 경량.">
    <div style="display: flex; align-items: center; gap: var(--space-4)">
      <mm-dismiss-button></mm-dismiss-button>
      <!-- 사용 예: 배너 내부에 배치 -->
      <div style="display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); background: var(--color-background-subtle); border-radius: var(--radius);">
        <mm-text size="14">새로운 업데이트가 있습니다.</mm-text>
        <mm-dismiss-button></mm-dismiss-button>
      </div>
    </div>
  </mm-component-section>

  <mm-component-section title="Delete Button" description="아이템·데이터를 영구 삭제하는 파괴적 액션 버튼. 빨간 아이콘, 호버 시 배경 강조.">
    <div style="display: flex; align-items: center; gap: var(--space-4)">
      <mm-delete-button></mm-delete-button>
      <!-- 사용 예: 리스트 아이템 내부에 배치 -->
      <div style="display: flex; align-items: center; justify-content: space-between; gap: var(--space-2); padding: var(--space-2) var(--space-3); border: var(--border); border-radius: var(--radius); min-width: 200px;">
        <mm-text size="14">파일명.pdf</mm-text>
        <mm-delete-button></mm-delete-button>
      </div>
    </div>
  </mm-component-section>

  <mm-component-section title="Clear Button" description="search field에서 사용.">
    <mm-clear-button></mm-clear-button>
  </mm-component-section>
  <mm-component-section title="Expand Button / Indicator" description="">
    <mm-icon-button variant="navigator" size="small" icon="nav-arrow-down"></mm-icon-button>
  </mm-component-section>
</main>
