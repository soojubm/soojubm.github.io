<main class="page js-tab">
  <mm-page-header
    heading="Icon Button"
    description="레이블 없이 메타포 아이콘만 사용하는 간결한 액션 버튼입니다. 사용자에게 툴팁으로 버튼의 용도를 명확히 전달합니다."
  ></mm-page-header>

  <mm-component-example>
    <mm-flex align-items="center" gap="2">
      <mm-icon-button
        variant="primary"
        icon="arrow-right"
        tooltip="Primary"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="secondary"
        icon="arrow-right"
        tooltip="Secondary"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="tertiary"
        icon="arrow-right"
        tooltip="Tertiary"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="ghost"
        icon="arrow-right"
        tooltip="Ghost"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="destructive"
        icon="trash"
        tooltip="Destructive"
        tooltip-placement="center"
      ></mm-icon-button>
    </mm-flex>
    <mm-separator></mm-separator>
    <mm-flex>
      <mm-icon-button
        variant="primary"
        icon="arrow-right"
        tooltip="다음"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="primary"
        icon="arrow-up"
        tooltip="위로"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="primary"
        size="small"
        icon="arrow-right"
        tooltip="다음"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="primary"
        size="small"
        icon="arrow-up"
        tooltip="위로"
        tooltip-placement="center"
      ></mm-icon-button>
    </mm-flex>
    <mm-separator></mm-separator>
    <mm-flex align-items="center" gap="2">
      <mm-icon-button icon="heart" tooltip="좋아요" tooltip-placement="center"></mm-icon-button>
      <mm-icon-button icon="user" tooltip="로그인" tooltip-placement="center"></mm-icon-button>
      <mm-icon-button
        icon="star-solid"
        tooltip="즐겨찾기됨"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button icon="star" tooltip="즐겨찾기" tooltip-placement="center"></mm-icon-button>
    </mm-flex>
    <mm-separator></mm-separator>
    <mm-flex>
      <mm-icon-button
        variant="secondary"
        icon="arrow-left"
        tooltip="이전"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="secondary"
        icon="arrow-right"
        color="gold"
        tooltip="다음"
        tooltip-placement="center"
      ></mm-icon-button>
    </mm-flex>
    <mm-separator></mm-separator>
    <mm-flex>
      <mm-icon-button
        variant="primary"
        icon="arrow-right"
        tooltip="다음"
        tooltip-placement="center"
        disabled
      ></mm-icon-button>
      <mm-icon-button
        icon="heart"
        tooltip="좋아요"
        tooltip-placement="center"
        disabled
      ></mm-icon-button>
      <mm-icon-button
        variant="secondary"
        icon="arrow-left"
        tooltip="이전"
        tooltip-placement="center"
        disabled
      ></mm-icon-button>
    </mm-flex>
  </mm-component-example>
  <mm-component-props>
    <mm-prop name="icon" type="IconName"></mm-prop>
    <mm-prop
      name="variant"
      type="'primary' | 'secondary' | 'tertiary' | 'ghost' | 'destructive' = 'tertiary'"
    ></mm-prop>
    <mm-prop name="size" type="'small' | 'medium' = 'medium'"></mm-prop>
    <mm-prop name="tooltip" type="string" optional></mm-prop>
    <mm-prop name="tooltip-placement" type="'left' | 'center' | 'right'" optional></mm-prop>
    <mm-prop name="disabled" type="boolean" optional></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="button-size" default="var(--size-medium)"></mm-token>
    <mm-token name="button-color" default="var(--color-background-subtle)"></mm-token>
    <mm-token name="button-radius" default="var(--radius)"></mm-token>
    <mm-token name="button-text-color" default="var(--color-foreground)"></mm-token>
  </mm-component-tokens>

  <mm-component-anatomy
    parts='[
      "컨테이너 — variant·size로 형태와 클릭 영역을 정의합니다.",
      "아이콘 — 액션을 나타내는 메타포(icon).",
      "접근성 레이블 — 화면에 보이지 않지만 액션을 설명하는 텍스트(aria-label).",
      "툴팁 — icon-only 버튼의 용도를 보조 설명합니다."
    ]'
  >
    <div style="position: relative; display: inline-block; padding-bottom: 3rem">
      <mm-tooltip content="좋아요" placement="center" open>
        <mm-icon-button
          slot="trigger"
          variant="primary"
          icon="heart"
          aria-label="좋아요"
        ></mm-icon-button>
      </mm-tooltip>

      <mm-list-marker
        variant="number"
        value="1"
        style="position: absolute; left: -1.75rem; top: 50%; transform: translateY(-50%)"
      ></mm-list-marker>
      <mm-list-marker
        variant="number"
        value="2"
        style="position: absolute; left: 50%; bottom: -1.75rem; transform: translateX(-50%)"
      ></mm-list-marker>
      <mm-list-marker
        variant="number"
        value="3"
        style="position: absolute; right: -1.75rem; top: 50%; transform: translateY(-50%)"
      ></mm-list-marker>
      <mm-list-marker
        variant="number"
        value="4"
        style="position: absolute; left: 50%; bottom: 0.5rem; transform: translateX(-50%)"
      ></mm-list-marker>
    </div>
  </mm-component-anatomy>

  <mm-component-guide>
    <mm-paragraph>
      Toggled states. Buttons can swap icons based on data states.
      <br />
      There are several icons within our library that have a “Filled” counterpart to indicate
      whether a state is toggled on. The “Outlined” version indicates it is toggled off.
    </mm-paragraph>
  </mm-component-guide>

  <mm-component-section
    heading="HamburgerButton"
    description="사이드바·내비게이션 메뉴를 여닫는 버튼."
  >
    <mm-hamburger-button></mm-hamburger-button>
  </mm-component-section>

  <mm-component-section heading="MoreButton" description="추가 액션 메뉴를 여는 버튼.">
    <mm-more-button></mm-more-button>
  </mm-component-section>

  <mm-component-section
    heading="PrevButton, NextButton"
    description="페이지·캐러셀·단계형 흐름에서 이전/다음 항목으로 이동합니다."
  >
    <mm-flex align-items="center" gap="4">
      <mm-tooltip content="이전" placement="center">
        <mm-prev-button slot="trigger"></mm-prev-button>
      </mm-tooltip>
      <mm-tooltip content="다음" placement="center">
        <mm-next-button slot="trigger"></mm-next-button>
      </mm-tooltip>
    </mm-flex>
  </mm-component-section>

  <mm-component-section
    heading="Close Button"
    description="모달, 패널, 시트 등 레이어를 닫는 보조 액션 버튼입니다."
  >
    <mm-flex align-items="center" gap="4">
      <mm-tooltip content="닫기" placement="center">
        <mm-close-button slot="trigger"></mm-close-button>
      </mm-tooltip>
    </mm-flex>
  </mm-component-section>

  <mm-component-section
    heading="Dismiss Button"
    description="배너, 알림, 토스트 등에서 콘텐츠를 비파괴적으로 해제하는 보조 액션 버튼입니다."
  >
    <mm-flex align-items="center" gap="4">
      <mm-tooltip content="해제" placement="center">
        <mm-dismiss-button slot="trigger"></mm-dismiss-button>
      </mm-tooltip>
      <!-- 사용 예: 배너 내부에 배치 -->
      <div
        style="
          display: flex;
          align-items: center;
          gap: var(--space-2);
          padding: var(--space-2) var(--space-3);
          background: var(--color-background-subtle);
          border-radius: var(--radius);
        "
      >
        <mm-paragraph>새로운 업데이트가 있습니다.</mm-paragraph>
        <mm-tooltip content="해제" placement="right">
          <mm-dismiss-button slot="trigger"></mm-dismiss-button>
        </mm-tooltip>
      </div>
    </mm-flex>
  </mm-component-section>

  <mm-component-section
    heading="Delete Button / Remove Button"
    description="아이템·데이터를 영구 삭제하는 파괴적 액션 버튼. 다이얼로그로 확인하기 때문에 시각적 노이즈 최소화."
  >
    <mm-flex align-items="center" gap="4">
      <mm-tooltip content="삭제" placement="center">
        <mm-delete-button slot="trigger"></mm-delete-button>
      </mm-tooltip>
      <!-- 사용 예: 리스트 아이템 내부에 배치 -->
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: var(--space-2);
          padding: var(--space-2) var(--space-3);
          border: var(--border);
          border-radius: var(--radius);
          min-width: 200px;
        "
      >
        <mm-paragraph>파일명.pdf</mm-paragraph>
        <mm-tooltip content="삭제" placement="right">
          <mm-delete-button slot="trigger"></mm-delete-button>
        </mm-tooltip>
      </div>
    </mm-flex>
  </mm-component-section>

  <mm-component-section
    heading="Copy Button"
    description="텍스트를 클립보드에 복사하는 버튼. 복사 성공 시 일시적으로 체크 아이콘으로 전환됩니다."
  >
    <mm-flex align-items="center" gap="4">
      <mm-tooltip content="복사" placement="center">
        <mm-copy-button slot="trigger" value="copied text"></mm-copy-button>
      </mm-tooltip>
      <!-- 사용 예: 코드 스니펫·링크와 함께 배치 -->
      <div
        style="
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: var(--space-2);
          padding: var(--space-2) var(--space-3);
          background: var(--color-background-subtle);
          border-radius: var(--radius);
          min-width: 240px;
        "
      >
        <mm-paragraph>https://soojubm.github.io</mm-paragraph>
        <mm-tooltip content="링크 복사" placement="right">
          <mm-copy-button slot="trigger" value="https://soojubm.github.io"></mm-copy-button>
        </mm-tooltip>
      </div>
    </mm-flex>
  </mm-component-section>

  <mm-component-section heading="Clear Button" description="search field에서 사용.">
    <mm-tooltip content="입력 지우기" placement="center">
      <mm-clear-button slot="trigger"></mm-clear-button>
    </mm-tooltip>
  </mm-component-section>
  <mm-component-section heading="Expand Button / Indicator" description="">
    <mm-icon-button
      variant="secondary"
      size="small"
      icon="nav-arrow-down"
      tooltip="펼치기"
      tooltip-placement="center"
    ></mm-icon-button>
  </mm-component-section>
</main>
