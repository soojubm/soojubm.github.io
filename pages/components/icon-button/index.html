<main class="page js-tab">
  <mm-page-header
    heading="Icon Button"
    description="레이블 없이 메타포 아이콘만 사용하는 간결한 액션 버튼입니다. 사용자에게 툴팁으로 버튼의 용도를 명확히 전달합니다."
  ></mm-page-header>

  <mm-component-example>
    <mm-button-group>
      <mm-icon-button
        variant="primary"
        icon="arrow-right"
        tooltip="Primary"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="secondary"
        icon="arrow-right"
        tooltip="Secondary"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="tertiary"
        icon="arrow-right"
        tooltip="Tertiary"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="ghost"
        icon="arrow-right"
        tooltip="Ghost"
        tooltip-placement="center"
      ></mm-icon-button>
      <mm-icon-button
        variant="destructive"
        icon="trash"
        tooltip="Destructive"
        tooltip-placement="center"
      ></mm-icon-button>
    </mm-button-group>
    <mm-separator></mm-separator>
    <mm-button-group>
      <mm-icon-button
        variant="primary"
        icon="arrow-right"
        tooltip="다음"
        tooltip-placement="center"
        disabled
      ></mm-icon-button>
      <mm-icon-button
        icon="heart"
        tooltip="좋아요"
        tooltip-placement="center"
        disabled
      ></mm-icon-button>
      <mm-icon-button
        variant="secondary"
        icon="arrow-left"
        tooltip="이전"
        tooltip-placement="center"
        disabled
      ></mm-icon-button>
    </mm-button-group>
  </mm-component-example>
  <mm-component-props>
    <mm-prop name="icon" type="IconName"></mm-prop>
    <mm-prop
      name="variant"
      type="'primary' | 'secondary' | 'tertiary' | 'ghost' | 'destructive' = 'tertiary'"
    ></mm-prop>
    <mm-prop name="size" type="'small' | 'medium' = 'medium'"></mm-prop>
    <mm-prop name="tooltip" type="string" optional></mm-prop>
    <mm-prop name="tooltip-placement" type="'left' | 'center' | 'right'" optional></mm-prop>
    <mm-prop name="aria-label" type="string" optional></mm-prop>
    <mm-prop name="role" type="string" optional></mm-prop>
    <mm-prop name="aria-controls" type="string" optional></mm-prop>
    <mm-prop name="aria-expanded" type="'true' | 'false'" optional></mm-prop>
    <mm-prop name="aria-haspopup" type="string" optional></mm-prop>
    <mm-prop name="disabled" type="boolean" optional></mm-prop>
  </mm-component-props>

  <mm-component-tokens>
    <mm-token name="button-height" default="var(--size-medium)"></mm-token>
    <mm-token name="button-background-color" default="var(--color-background-subtle)"></mm-token>
    <mm-token name="button-border-radius" default="var(--radius)"></mm-token>
    <mm-token name="button-text-color" default="var(--color-foreground)"></mm-token>
  </mm-component-tokens>

  <mm-component-anatomy
    parts='[
      "컨테이너 — variant·size로 형태와 클릭 영역을 정의합니다.",
      "아이콘 — 액션을 나타내는 메타포(icon).",
      "접근성 레이블 — 화면에 보이지 않지만 액션을 설명하는 텍스트(aria-label).",
      "툴팁 — icon-only 버튼의 용도를 보조 설명합니다."
    ]'
  >
    <div style="position: relative; display: inline-block; padding-bottom: 3rem">
      <mm-tooltip content="좋아요" placement="center" open>
        <mm-icon-button
          slot="trigger"
          variant="primary"
          icon="heart"
          aria-label="좋아요"
        ></mm-icon-button>
      </mm-tooltip>

      <mm-list-marker
        variant="number"
        value="1"
        style="position: absolute; left: -1.75rem; top: 50%; transform: translateY(-50%)"
      ></mm-list-marker>
      <mm-list-marker
        variant="number"
        value="2"
        style="position: absolute; left: 50%; bottom: -1.75rem; transform: translateX(-50%)"
      ></mm-list-marker>
      <mm-list-marker
        variant="number"
        value="3"
        style="position: absolute; right: -1.75rem; top: 50%; transform: translateY(-50%)"
      ></mm-list-marker>
      <mm-list-marker
        variant="number"
        value="4"
        style="position: absolute; left: 50%; bottom: 0.5rem; transform: translateX(-50%)"
      ></mm-list-marker>
    </div>
  </mm-component-anatomy>

  <mm-component-guide>
    <mm-component-feature-list>
      <mm-feature heading="Interactive - action" description=""></mm-feature>
      <mm-feature
        heading="Groupable"
        description="연속된 아이콘 버튼은 button-group으로 묶어 하나의 도구 단위로 제시합니다. 간격과 정렬은 그룹이 소유합니다."
      ></mm-feature>
    </mm-component-feature-list>
    <mm-paragraph>
      Toggled states. Buttons can swap icons based on data states.
      <br />
      There are several icons within our library that have a “Filled” counterpart to indicate
      whether a state is toggled on. The “Outlined” version indicates it is toggled off.
    </mm-paragraph>
  </mm-component-guide>

  <mm-component-section
    heading="HamburgerButton"
    description="사이드바·내비게이션 메뉴를 여닫는 버튼."
  >
    <mm-hamburger-button aria-controls="hamburger-menu-example"></mm-hamburger-button>
    <div id="hamburger-menu-example" hidden></div>
  </mm-component-section>

  <mm-component-section heading="MoreButton" description="추가 액션 메뉴를 여는 버튼.">
    <mm-more-button aria-controls="more-menu-example"></mm-more-button>
    <div id="more-menu-example" hidden></div>
  </mm-component-section>

  <mm-component-section
    heading="PrevButton, NextButton"
    description="페이지·캐러셀·단계형 흐름에서 이전/다음 항목으로 이동합니다."
  >
    <mm-button-group>
      <mm-prev-button tooltip="이전" tooltip-placement="center"></mm-prev-button>
      <mm-next-button tooltip="다음" tooltip-placement="center"></mm-next-button>
    </mm-button-group>
  </mm-component-section>

  <mm-component-section
    heading="Close Button"
    description="모달, 패널, 시트 등 레이어를 닫는 보조 액션 버튼입니다."
  >
    <mm-close-button tooltip="닫기" tooltip-placement="center"></mm-close-button>
  </mm-component-section>

  <mm-component-section
    heading="Dismiss Button"
    description="배너, 알림, 토스트 등에서 콘텐츠를 비파괴적으로 해제하는 보조 액션 버튼입니다."
  >
    <mm-dismiss-button tooltip="닫기" tooltip-placement="center"></mm-dismiss-button>
  </mm-component-section>

  <mm-component-section
    heading="Delete Button / Remove Button"
    description="아이템·데이터를 영구 삭제하는 파괴적 액션 버튼. 다이얼로그로 확인하기 때문에 시각적 노이즈 최소화."
  >
    <mm-delete-button tooltip="삭제" tooltip-placement="center"></mm-delete-button>
  </mm-component-section>

  <mm-component-section
    heading="Copy Button"
    description="텍스트를 클립보드에 복사하는 버튼. 복사 성공 시 일시적으로 체크 아이콘으로 전환됩니다."
  >
    <mm-copy-button tooltip="복사" tooltip-placement="center" value="copied text"></mm-copy-button>
  </mm-component-section>

  <mm-component-section heading="Clear Button" description="search field에서 사용.">
    <mm-clear-button tooltip="입력 지우기" tooltip-placement="center"></mm-clear-button>
  </mm-component-section>
  <mm-component-section heading="Expand Button / Indicator" description="">
    <mm-icon-button
      variant="secondary"
      size="small"
      icon="nav-arrow-down"
      tooltip="펼치기"
      tooltip-placement="center"
    ></mm-icon-button>
  </mm-component-section>
</main>
