      .token-color-markers {

      }

      .delay-second {

      }

      .delay-third {

      .browserWindowBody_Idgs {

      }

      .browserWindowMenuIcon_Vhuh {

      .bar_rrRL {
        display: block;
        width: var(--size-tiny);
        height: var(--space-05);
        margin: var(--space-05) 0;
        border-radius: var(--radius-round);
        background-color: var(--color-foreground-light);
      }

      .zindex-layer {
        display: flex;
        align-items: center;
        justify-content: center;
        border: var(--border-stronger);
        border-radius: var(--radius);
        background: var(--color-background-subtle);
        position: absolute;
        transition: transform var(--duration-quickly) var(--bazier);
      }

      .zindex-layer:hover {
        transform: translateY(calc(var(--space-2) * -1));
      }

      .zindex-layer.is-default {
        left: var(--space-4);
        top: var(--space-4);
        width: calc(100% - var(--space-4) * 2);
        height: calc(100% - var(--space-4) * 2);
        border-style: dashed;
        z-index: var(--zindex-default);
      }

      .zindex-layer.is-popover {
        right: calc(var(--space-4) * 2);
        top: calc(var(--space-4) * 1.5);
        width: calc(var(--size-huge) * 1.5);
        height: var(--size-large);
        background: var(--selection-background);
        z-index: var(--zindex-popover);
      }

      .zindex-layer.is-sheet {
        left: calc(var(--space-4) * 2);
        right: calc(var(--space-4) * 2);
        bottom: calc(var(--size-large) - var(--space-2));
        height: calc(var(--size-huge) * 1.1);
        border-radius: var(--radius-large) var(--radius-large) var(--radius) var(--radius);
        background: var(--color-background);
        z-index: var(--zindex-sheet);
      }

      .zindex-layer.is-bottombar {
        align-items: stretch;
        justify-content: stretch;
        left: var(--space-4);
        right: var(--space-4);
        bottom: var(--space-4);
        height: var(--size-large);
        padding: var(--space-1) var(--space-2);
