      .token-note {

      .token-color-swatch {

      .token-color-markers {

      .token-color-marker {

        background: var(--color-background-strong);
      }

      .animation-rotation {
        animation: rotation 1s var(--bazier) infinite;
      }

      .animation-fadeup {
        animation: fadeup var(--animation-duration) var(--bazier) infinite alternate;
      }

      .delay-second {
        animation-delay: var(--animation-delay-second);
      }

      .delay-third {
        animation-delay: var(--animation-delay-third);
      }

      .browserWindow_my1Q {
        width: min(100%, calc(var(--size-huge) * 6));
        border: var(--border-stronger);
        border-radius: var(--radius-large);
        background: var(--color-background);

      .browserWindowHeader_jXSR {

        padding: var(--space-2) var(--space-4);

      .dots {

      .dot_giz1 {

        height: var(--space-3);

        background-color: var(--color-border-strong);
      }

      .browserWindowAddressBar_Pd8y {
        flex: 1 0 0%;
        margin: 0 var(--space-4);
        padding: var(--space-1) var(--space-3);
        border-radius: var(--radius-round);
        background-color: var(--color-background);
        user-select: none;
      }

      .browserWindowBody_Idgs {
        height: calc(var(--size-huge) * 2.5);
        padding: var(--space-4);
        background: var(--color-background);
        position: relative;
      }

      .browserWindowMenuIcon_Vhuh {
        margin-left: auto;
      }

      .bar_rrRL {
        display: block;
        width: var(--size-tiny);
        height: var(--space-05);
        margin: var(--space-05) 0;
        border-radius: var(--radius-round);
        background-color: var(--color-foreground-light);
      }

      .zindex-layer {
        display: flex;
        align-items: center;
        justify-content: center;
        border: var(--border-stronger);
        border-radius: var(--radius);
        background: var(--color-background-subtle);
        position: absolute;
        transition: transform var(--duration-quickly) var(--bazier);
      }

      .zindex-layer:hover {
        transform: translateY(calc(var(--space-2) * -1));
      }

      .zindex-layer.is-default {
        left: var(--space-4);
        top: var(--space-4);
        width: calc(100% - var(--space-4) * 2);
        height: calc(100% - var(--space-4) * 2);
        border-style: dashed;
        z-index: var(--zindex-default);
      }

      .zindex-layer.is-popover {
        right: calc(var(--space-4) * 2);
        top: calc(var(--space-4) * 1.5);
        width: calc(var(--size-huge) * 1.5);
        height: var(--size-large);
        background: var(--selection-background);
        z-index: var(--zindex-popover);
      }

      .zindex-layer.is-sheet {
        left: calc(var(--space-4) * 2);
        right: calc(var(--space-4) * 2);
        bottom: calc(var(--size-large) - var(--space-2));
        height: calc(var(--size-huge) * 1.1);
        border-radius: var(--radius-large) var(--radius-large) var(--radius) var(--radius);
        background: var(--color-background);
        z-index: var(--zindex-sheet);
      }

      .zindex-layer.is-bottombar {
        align-items: stretch;
        justify-content: stretch;
        left: var(--space-4);
        right: var(--space-4);
        bottom: var(--space-4);
        height: var(--size-large);
        padding: var(--space-1) var(--space-2);
        background: var(--color-background-strong);
        z-index: var(--zindex-bottombar);
      }

      .zindex-layer.is-bottombar mm-list-marker {
        --color-background: var(--color-background-strong);
      }

      .zindex-bottombar-tabs {
        display: flex;
        align-items: center;
        width: 100%;
        height: 100%;
        gap: var(--space-1);

      .zindex-bottombar-tab {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        flex: 1 1 0;
        gap: var(--space-1);

        width: var(--size-small);

      }

      .zindex-bottombar-marker {
        position: absolute;
        right: var(--space-2);
