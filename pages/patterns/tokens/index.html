<main class="page">
  <mm-page-header
    title="Tokens"
    description="디자인 시스템의 기본 구성 요소입니다. 토큰은 색상, 타이포그래피, 간격, 크기, 모양 및 기타 스타일 속성을 포함하여 제품의 시각적 및 기능적 특성을 정의합니다. 디자인 토큰을 사용하면 일관된 디자인 언어를 유지하고, 다양한 플랫폼과 장치에서 동일한 사용자 경험을 제공하며, 디자인과 개발 간의 협업을 촉진할 수 있습니다."
  ></mm-page-header>

  <style>
    .is-primary100 { background: var(--green100); border: 0 !important; }
    .is-primary200 { background: var(--green800); border: 0 !important; }
    .is-elevation mm-token-item { background: none; box-shadow: var(--shadow); }

    .animation-rotation { animation: rotation 1s var(--bazier) infinite; }
    .animation-fadeup   { animation: fadeup  1s var(--bazier) infinite; }
    .animation-marquee  { animation: marquee 4s var(--bazier) infinite; }
    .delay-second { animation-delay: var(--animation-delay-second); }
    .delay-third  { animation-delay: var(--animation-delay-third); }
  </style>

  <mm-component-section

      <mm-text-group>
        <mm-text size="14" weight="bold">Primitives</mm-text>
      </mm-text-group>

      <mm-token-group>
        <mm-token-item label="--green100: rgba(10, 160, 80, 0.1)" style="border: 0; background-color: var(--green100)"></mm-token-item>
        <mm-token-item label="--green800: #1b995c" style="border: 0; background-color: var(--green800)"><span style="color:#fff"></span></mm-token-item>
        <mm-token-item label="--red100: rgba(243, 68, 97, .06)" style="border: 0; background-color: var(--red100)"></mm-token-item>
        <mm-token-item label="--red800: #f02849" style="border: 0; background-color: var(--red800)"></mm-token-item>

      </mm-token-group>

      <mm-separator></mm-separator>

      <mm-token-group>

        <mm-token-item label="--gray50: #fcfdfc" style="border: 0; background: #fcfdfc"></mm-token-item>
        <mm-token-item label="--gray100: #f5f8f5" style="border: 0; background: var(--gray100)"></mm-token-item>
        <mm-token-item label="--gray200: #e0e2e1" style="border: 0; background: var(--gray200)">
          <small>bullet 등에 사용</small>

        <mm-token-item label="--gray300: #c1c3c2" style="border: 0; background: var(--gray300)"></mm-token-item>
        <mm-token-item label="--gray400: #979d9a" style="border: 0; background: var(--gray400)"></mm-token-item>
        <mm-token-item label="--gray800: #343c38" style="border: 0; background: var(--gray800)"></mm-token-item>
        <mm-token-item label="--gray900: #1e2321" style="border: 0; background: var(--gray900)"></mm-token-item>
      </mm-token-group>

      <mm-separator></mm-separator>

      <mm-token-group>
        <mm-token-item label="TODO Skeleton"></mm-token-item>
        <mm-token-item label="TODO Transparent gradient"></mm-token-item>
        <mm-token-item label="--color-categorical-1: null TODO"></mm-token-item>
      </mm-token-group>
    </div>

    <br />

    <mm-text size="14" weight="bold">Foreground (Text, Icon)</mm-text>

        <mm-text size="14" weight="bold">soojubm</mm-text>

    <br />

    <mm-token-group>

      <mm-token-item label="--color-accent-foreground: var(--gray0)"></mm-token-item>
      <mm-token-item label="--color-accent-border" style="border: 0; background: var(--color-accent)"></mm-token-item>
    </mm-token-group>

  <mm-component-section
    title="Animation"
    description="콘텐츠보다 액션이 강조되지 않도록 뷰포트 내에서 delay를 최대 3개로 제한합니다. inactive로 변경될 때(닫기 등) 즉시(instantly) 실행합니다."
  >
    <mm-token-group>
      <mm-token-item label="--animation-delay-first: 0s" preview-style="">
        <figure class="animation-fadeup" style="width: var(--size-large); height: var(--size-large); background: var(--color-background-strong); border-radius: var(--radius)"></figure>
      </mm-token-item>
      <mm-token-item label="--animation-delay-second: .2s">
        <figure class="animation-fadeup delay-second" style="width: var(--size-large); height: var(--size-large); background: var(--color-background-strong); border-radius: var(--radius)"></figure>
      </mm-token-item>
      <mm-token-item label="--animation-delay-third: .4s">
        <figure class="animation-fadeup delay-third" style="width: var(--size-large); height: var(--size-large); background: var(--color-background-strong); border-radius: var(--radius)"></figure>
      </mm-token-item>
    </mm-token-group>
    <mm-separator></mm-separator>
    <mm-token-group>
      <mm-token-item label="--animation-timing-function: cubic-bezier(0.455, 0.03, 0.515, 0.955)"></mm-token-item>
    </mm-token-group>
    <mm-separator></mm-separator>
    <mm-token-group>
      <mm-token-item label="--animation-duration: .4s">
        <figure class="animation-fadeup" style="width: var(--size-large); height: var(--size-large); background: var(--color-background-strong); border-radius: var(--radius)"></figure>
      </mm-token-item>
      <mm-token-item label="--animation-duration-quick: .2s">
        <figure class="animation-fadeup delay-second" style="width: var(--size-large); height: var(--size-large); background: var(--color-background-strong); border-radius: var(--radius)"></figure>
      </mm-token-item>
      <mm-token-item label="--animation-duration-slow: .8s">
        <figure class="animation-fadeup delay-third" style="width: var(--size-large); height: var(--size-large); background: var(--color-background-strong); border-radius: var(--radius)"></figure>
      </mm-token-item>
      <mm-token-item label="--animation-duration-instant: 0"></mm-token-item>
    </mm-token-group>
    <mm-separator></mm-separator>
    <mm-token-group>
      <mm-token-item label="@keyframes fadeup">
        <figure class="animation-fadeup" style="width: var(--size-large); height: var(--size-large); background: var(--color-background-strong); border-radius: var(--radius)"></figure>
      </mm-token-item>
      <mm-token-item label="@keyframes rotation">
        <figure class="animation-rotation" style="width: var(--size-large); height: var(--size-large); background: var(--color-background-strong); border-radius: var(--radius)"></figure>
      </mm-token-item>
      <mm-token-item label="@keyframes marquee">
        <figure class="animation-marquee" style="width: var(--size-large); height: var(--size-large); background: var(--color-background-strong); border-radius: var(--radius)"></figure>
      </mm-token-item>
      <mm-token-item label="@keyframes pop"></mm-token-item>
    </mm-token-group>
  </mm-component-section>

  <mm-text-group>
    <mm-text size="18">Checklist</mm-text>
    <mm-text-list texts='["warning과 danger를 반드시 제공해야 하나. attention 하나로 할 수 없나.", "color-icon와 color-text는 항상 동일한가요? myChatBubble 에서 텍스트는 foreground-color는 흰색이 된다", "color-text-disabled, color-input-disabled, color-button-disabled는 항상 같은 것은 아니다.", "elevation.surface / overay, raised, sunken // atlassian 동일한데 왜 나눠놨지.", "폰트의 baseline이 달라서 텍스트의 상하 간격이 안 맞을 수 있다.", "그림자를 이용한 시각적 상승 효과로 주변 요소 대비 강조. 더 높은 우선순위 및 행동유도를 위한 높은 고도.", "개별 토큰에 디스크립션이 필요하지 않도록 명명합니다.", "--[namespace]-[component / category]-[attribute]-[status]"]'></mm-text-list>

    <mm-text size="18">Changelog</mm-text>
    <mm-text-list texts='["250116 연한 회색 배경 하나로 하니 부족. 배경도 마찬가지임. 이제 최소한의 정의로 하는 실험을 종료할 단계인 듯. 200, 50 추가."]'></mm-text-list>
<mm-text-list texts='["인버트 컬러셋을 추가로 정의하지 않습니다. 하나의 컬러셋으로 다크 테마에 대응합니다."]'></mm-text-list>
