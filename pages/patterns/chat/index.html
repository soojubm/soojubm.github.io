<mm-page layout="chat">
  <mm-chat-room>
    <mm-chat-feed slot="feed">
      <mm-chat-date label="2022년 5월 17일"></mm-chat-date>

      <mm-chat-message username="수줍이">
        <mm-ai-chat-bubble>
          날짜는 버블 밖으로 나와야한다. 리얼타임. 버블의 전송 상태. reaction. iMessage에서 날짜는
          터치 제스쳐. 1:1대화 / 1:n 대화.
        </mm-ai-chat-bubble>
        <mm-ai-chat-bubble>짧은 내용일 때.</mm-ai-chat-bubble>
        <mm-ai-chat-bubble src="/src/images/springsteen.jpg" time="12:00 am"></mm-ai-chat-bubble>
      </mm-chat-message>

      <mm-chat-message mine>
        <mm-my-chat-bubble status="전송됨">
          감사합니다! 아바타와 닉네임 불필요. 전송 순서 중요.
        </mm-my-chat-bubble>
        <mm-my-chat-bubble src="/src/images/prometheus.jpg" time="12:01 am"></mm-my-chat-bubble>
      </mm-chat-message>

      <mm-chat-date label="2022년 5월 18일"></mm-chat-date>

      <mm-chat-message username="수줍이">
        <mm-ai-chat-bubble>안녕하세요 👋</mm-ai-chat-bubble>
      </mm-chat-message>

      <mm-chat-message mine>
        <mm-my-chat-bubble failed>네트워크 오류로 전송에 실패한 메시지입니다.</mm-my-chat-bubble>
      </mm-chat-message>

      <mm-chat-message mine>
        <mm-my-chat-bubble status="읽음">반갑습니다! 오늘도 좋은 하루 보내세요.</mm-my-chat-bubble>
        <mm-my-chat-bubble typing></mm-my-chat-bubble>
      </mm-chat-message>
    </mm-chat-feed>

    <div slot="input">
      <mm-chat-input-suggestions style="margin-bottom: var(--space-2)">
        <mm-chat-input-suggestion>네, 좋아요 👍</mm-chat-input-suggestion>
        <mm-chat-input-suggestion>다시 설명해 주세요</mm-chat-input-suggestion>
        <mm-chat-input-suggestion icon="calendar">일정 잡기</mm-chat-input-suggestion>
        <mm-chat-input-suggestion>나중에 할게요</mm-chat-input-suggestion>
      </mm-chat-input-suggestions>

      <mm-prompt-input>
        <mm-prompt-input-textarea placeholder="메시지를 입력하세요..."></mm-prompt-input-textarea>
        <mm-textfield-action-bar>
          <mm-icon-button icon="send-diagonal" aria-label="전송"></mm-icon-button>
        </mm-textfield-action-bar>
      </mm-prompt-input>
    </div>
  </mm-chat-room>
</mm-page>
