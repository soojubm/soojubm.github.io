<main class="page">
  <mm-flex direction="column" gap="4rem">
    <mm-page-header
      heading="Signifier"
      description="기표는 사용자가 UI를 보고 해당 요소의 역할, 상태, 가능한 행동을 이해할 수 있도록 하는 시각적 단서입니다. 이 페이지는 디자인 시스템 안에서 특정 시각 표현이 특정 의미에만 사용되도록 제한하는 공통 계약을 정의합니다."
    ></mm-page-header>

        일관되게 정의하는 것입니다.
      </mm-caption>
      <mm-text-list

        "상태를 표현하는 시각 언어는 컴포넌트에 종속되지 않고 제품 전체에 일관합니다.",
        "성공적인 상호작용 피드백은 장식적인 것이 아니라 정보를 제공하는 것입니다. 시각적 노이즈나 강렬한 색상 변화를 유발하는 정교한 전환을 피하세요. 주의를 산만하게 하는 애니메이션은 혼란을 야기하고 인터페이스를 사용하기 불편하게 만들 수 있습니다."
        ]'
      ></mm-text-list>
    </mm-paragraph-group>

    <mm-feature-group columns="4" column-max-width="400px">
      <mm-feature
        icon="check"
        heading="One signifier, one primary meaning"
        description="하나의 시각적 단서는 하나의 주요 의미를 갖습니다. 시스템이 명시적으로 허용하지 않는 한 같은 단서를 다른 의미로 재사용하지 않습니다."
      ></mm-feature>
      <mm-feature
        icon="interactive"
        heading="Do not use interaction cues as decoration"
        description="클릭 가능성을 암시하는 색상, 밑줄, 커서, 아이콘은 장식이나 일반 강조로 사용하지 않습니다. 사용자는 이러한 단서를 인터랙션 가능성으로 학습하기 때문입니다."
      ></mm-feature>
      <mm-feature
        icon="easyScanning"
        heading="Do not rely on color alone"
        description="상태나 피드백은 색상만으로 전달하지 않습니다. 중요한 상태는 아이콘, 텍스트, 형태, 위치, ARIA 속성 등과 함께 제공해야 합니다."
      ></mm-feature>
    </mm-feature-group>

    <mm-flex direction="column" gap="3">
      <mm-text size="24" weight="bold" as="h3">Icon Signifiers</mm-text>
      <mm-paragraph>
        아이콘은 기표로 정의한 의미를 전달하는 기호입니다. 단순히 장식적인 용도로 사용하지 마세요.
        아이콘은 레이블을 보완하거나, 제한된 공간에서 레이블을 대체하거나, 상태와 행동 가능성을
        명확히 하기 위해 사용합니다.
      </mm-paragraph>
      <mm-text-list
        texts='[
        "Indicator Icons (Label) - Decorative Icon",
          "Use only universally recognized icons to represent actions or options."

      ]'
      ></mm-text-list>
      <mm-filter-button-group id="icon-category-picker" mode="single">
        <mm-filter-button value="action" selected>Actions</mm-filter-button>
        <mm-filter-button value="navigation">Navigations</mm-filter-button>
        <mm-filter-button value="status">Status</mm-filter-button>
        <mm-filter-button value="selection">Selection</mm-filter-button>
        <mm-filter-button value="visibility">Visibility</mm-filter-button>
        <mm-filter-button value="communication">Communication</mm-filter-button>
      </mm-filter-button-group>

      <div id="icon-section-action">
        <mm-grid columns="3">
          <mm-list-row
            icon="plus"
            size="large"
            label="Add"
            description="항목을 추가하거나 생성합니다."
          ></mm-list-row>
          <mm-list-row
            icon="xmark"
            size="large"
            label="Close"
            description="대화상자나 패널을 닫습니다."
          ></mm-list-row>
          <mm-list-row
            icon="copy"
            size="large"
            label="Copy"
            description="내용을 클립보드에 복사합니다."
          ></mm-list-row>
          <mm-list-row
            icon="check"
            size="large"
            label="Copy Success"
            description="복사 완료 상태를 나타냅니다."
          ></mm-list-row>
          <mm-list-row
            icon="trash"
            size="large"
            label="Delete"
            description="항목을 영구 삭제합니다."
          ></mm-list-row>
          <mm-list-row
            icon="xmark"
            size="large"
            label="Dismiss"
            description="알림이나 배너를 닫습니다."
          ></mm-list-row>
          <mm-list-row
            icon="filter"
            size="large"
            label="Filter"
            description="목록에 필터를 적용합니다."
          ></mm-list-row>
          <mm-list-row
            icon="plus"
            size="large"
            label="Increase"
            description="값이나 수량을 증가시킵니다."
          ></mm-list-row>
          <mm-list-row
            icon="import"
            size="large"
            label="Import"
            description="파일이나 데이터를 가져옵니다."
          ></mm-list-row>
          <mm-list-row
            icon="log-out"
            size="large"
            label="Log Out"
            description="로그아웃합니다."
          ></mm-list-row>
          <mm-list-row
            icon="more-vert"
            size="large"
            label="More Actions"
            description="추가 액션 메뉴를 표시합니다."
          ></mm-list-row>
          <mm-list-row
            icon="minus"
            size="large"
            label="Decrease"
            description="값이나 수량을 감소시킵니다."
          ></mm-list-row>
          <mm-list-row
            icon="refresh"
            size="large"
            label="Refresh"
            description="화면이나 데이터를 새로고침합니다."
          ></mm-list-row>
          <mm-list-row
            icon="refresh-double"
            size="large"
            label="Retry"
            description="실패한 작업을 재시도합니다."
          ></mm-list-row>
          <mm-list-row
            icon="send-diagonal"
            size="large"
            label="Send"
            description="메시지나 데이터를 전송합니다."
          ></mm-list-row>
          <mm-list-row
            icon="settings"
            size="large"
            label="Settings"
            description="설정 화면으로 이동합니다."
          ></mm-list-row>
          <mm-list-row
            icon="arrow-up-right"
            size="large"
            label="Share"
            description="콘텐츠를 외부로 공유합니다."
          ></mm-list-row>
        </mm-grid>
      </div>

      <div id="icon-section-navigation" hidden>
        <mm-grid columns="3">
          <mm-list-row
            icon="arrow-left"
            size="large"
            label="Back"
            description="이전 화면으로 돌아갑니다."
          ></mm-list-row>
          <mm-list-row
            icon="nav-arrow-up"
            size="large"
            label="Collapse"
            description="펼쳐진 영역을 접습니다."
          ></mm-list-row>
          <mm-list-row
            icon="nav-arrow-down"
            size="large"
            label="Expand"
            description="영역을 펼쳐 내용을 표시합니다."
          ></mm-list-row>
          <mm-list-row
            icon="arrow-right"
            size="large"
            label="Forward"
            description="다음 화면으로 이동합니다."
          ></mm-list-row>
          <mm-list-row
            icon="menu-scale"
            size="large"
            label="Menu"
            description="내비게이션 메뉴를 엽니다."
          ></mm-list-row>
          <mm-list-row
            icon="arrow-right"
            size="large"
            label="Next"
            description="다음 항목으로 이동합니다."
          ></mm-list-row>
          <mm-list-row
            icon="open-in-browser"
            size="large"
            label="Open External"
            description="외부 목적지로 이동합니다."
          ></mm-list-row>
          <mm-list-row
            icon="arrow-left"
            size="large"
            label="Previous"
            description="이전 항목으로 이동합니다."
          ></mm-list-row>
          <mm-list-row
            icon="arrow-up"
            size="large"
            label="Scroll Top"
            description="페이지 상단으로 스크롤합니다."
          ></mm-list-row>
          <mm-list-row
            icon="nav-arrow-right"
            size="large"
            label="Sitemap"
            description="하위 항목이 있음을 나타냅니다."
          ></mm-list-row>
        </mm-grid>
      </div>

      <div id="icon-section-status" hidden>
        <mm-grid columns="3">
          <mm-list-row
            icon="warning-circle"
            size="large"
            label="Danger"
            description="위험하거나 돌이킬 수 없는 상태입니다."
          ></mm-list-row>
          <mm-list-row
            icon="check-circle-solid"
            size="large"
            label="Done"
            description="작업이 완전히 완료된 상태입니다."
          ></mm-list-row>
          <mm-list-row
            icon="alert-circle"
            size="large"
            label="Error"
            description="오류 또는 실패 상태를 나타냅니다."
          ></mm-list-row>
          <mm-list-row
            icon="info-circle"
            size="large"

          ></mm-list-row>
          <mm-list-row
            icon="check-circle"
            size="large"
            label="Success"
            description="작업이 성공적으로 완료되었습니다."

          <mm-list-row
            icon="warning-triangle"
            size="large"
            label="Warning"
            description="진행 전에 주의가 필요한 상태입니다."
          ></mm-list-row>
        </mm-grid>
      </div>

      <div id="icon-section-selection" hidden>
        <mm-grid columns="3">
          <mm-list-row
            icon="bookmark"
            size="large"
            label="Bookmark"
            description="저장하지 않은 북마크 상태입니다."

          <mm-list-row
            icon="bookmark-solid"
            size="large"
            label="Bookmark Selected"
            description="북마크에 저장된 상태입니다."
          ></mm-list-row>
          <mm-list-row
            icon="check"
            size="large"
            label="Check"
            description="선택됨, 완료됨, 확인됨을 나타냅니다."

            icon="star"

            icon="star-solid"
            size="large"
            label="Favorite Selected"
            description="즐겨찾기에 추가된 상태입니다."
          ></mm-list-row>
          <mm-list-row
            icon="heart"
            size="large"
            label="Like"
            description="좋아요를 누르지 않은 상태입니다."
          ></mm-list-row>
          <mm-list-row
            icon="heart-solid"
            size="large"
            label="Like Selected"
            description="좋아요를 누른 상태입니다."
          ></mm-list-row>
        </mm-grid>
      </div>

      <div id="icon-section-visibility" hidden>
        <mm-grid columns="3">
          <mm-list-row
            icon="eye-closed"
            size="large"
            label="Hide"
            description="내용을 숨깁니다."
          ></mm-list-row>
          <mm-list-row
            icon="eye-solid"
            size="large"
            label="Reveal"
            description="숨겨진 내용(예: 비밀번호)을 표시합니다."
          ></mm-list-row>
          <mm-list-row
            icon="xray-view"
            size="large"
            label="Xray"
            description="숨겨진 구조나 레이어를 투시합니다."
          ></mm-list-row>
        </mm-grid>
      </div>

      <div id="icon-section-communication" hidden>
        <mm-grid columns="3">
          <mm-list-row
            icon="megaphone"
            size="large"
            label="Announcement"
            description="공지사항이나 중요 메시지를 나타냅니다."
          ></mm-list-row>
          <mm-list-row
            icon="message"
            size="large"
            label="Comment"
            description="댓글이나 메모를 작성합니다."
          ></mm-list-row>
          <mm-list-row
            icon="thumbs-up"
            size="large"
            label="Like"
            description="긍정적인 반응을 나타냅니다."
          ></mm-list-row>
          <mm-list-row
            icon="thumbs-down"
            size="large"
            label="Dislike"
            description="부정적인 반응을 나타냅니다."
          ></mm-list-row>
          <mm-list-row
            icon="mail"
            size="large"
            label="Mail"
            description="이메일 또는 메시지를 보냅니다."
          ></mm-list-row>
          <mm-list-row
            icon="mail-in"
            size="large"
            label="Mail In"
            description="받은 메시지를 나타냅니다."
          ></mm-list-row>
          <mm-list-row
            icon="bell"
            size="large"
            label="Notification"
            description="알림 또는 공지를 나타냅니다."
          ></mm-list-row>
          <mm-list-row
            icon="reply-to-message"
            size="large"
            label="Reply"
            description="메시지에 답장합니다."
          ></mm-list-row>
        </mm-grid>
      </div>
    </mm-flex>
