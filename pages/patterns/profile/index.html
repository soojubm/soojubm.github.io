<main class="profile">
  <section class="profile-user">
    <mm-user-snippet
      name="수줍이"
      email="soojubm@gmail.com"
      phone="010 3121 7045"
      description="UI Designer"
      avatar-src="/src/images/soojubm.png"
      avatar-size="huge"
      avatar-variant="secondary"
      tag-label="접속 중"
    ></mm-user-snippet>

    <mm-button-group>
      <mm-follow-button></mm-follow-button>
      <mm-button variant="tertiary">메시지</mm-button>
    </mm-button-group>
    <mm-read-more-paragraph
      limit="100"
      content="Sometimes at night, I find myself behind the computer. When I finally blink, a mess of code is drawing random structures on the screen. I spend the rest of the night staring. 유아이를 그립니다. 배경을 넣어보았다. 모바일에서 팔로우 버튼을 상단으로 조정해야 한다. 업로드 버튼과 설정 버튼."
    ></mm-read-more-paragraph>
    <mm-keyword-tag-group
      keywords='["HTML5","VanillaJS","ReactJS","WebComponents","Typescript","GoogleAnalytics","Figma"]'
    ></mm-keyword-tag-group>
    <div>
      <mm-keyvalue key="팔로워" value="621.1K"></mm-keyvalue>
      <mm-keyvalue key="팔로우 중" value="1,284"></mm-keyvalue>
    </div>
    <mm-avatar-group avatars='["","","",""]' label="Followed by 수줍이 외 4명"></mm-avatar-group>
    <mm-social-links
      compact
      github="https://github.com/soojubm"
      pinterest="https://www.pinterest.co.kr/soojubm/"
      facebook="https://www.facebook.com/soojubm/"
    ></mm-social-links>
  </section>

  <section class="profile-body">
    <mm-tabs value="daily" variant="pill">
      <mm-tab-list>
        <mm-tab value="daily">프로젝트</mm-tab>
        <mm-tab value="weekly">두번째 탭</mm-tab>
        <mm-tab value="monthly">빈 상태</mm-tab>
      </mm-tab-list>

      <menu role="menubar" style="margin: var(--space-3) 0">
        <!-- <b role="status">3 works</b> -->
        <mm-flex justify="between" gap="2" nowrap>
          <mm-view-mode-switcher></mm-view-mode-switcher>
          <mm-sort-dropdown></mm-sort-dropdown>
        </mm-flex>
      </menu>

      <mm-tab-panel value="daily">
        <section class="portfolio-grid">
          <mm-portfolio-item
            modal="newneek"
            label="뉴닉"
            description="디스크립션..."
            src="/src/images/newneek/gosum-spinner.png"
            badge="최신"
            date="2024-06-20"
            keywords='["프로젝트관리","디자인","프론트엔드개발"]'
          ></mm-portfolio-item>

          <mm-portfolio-item
            modal="etc-works"
            label="프리랜서"
            description="선별된..."
            src="/src/images/work-studium.jpg"
            date="2022-09-12"
            keywords='["프리랜서","디자인","워드프레스"]'
          ></mm-portfolio-item>

          <mm-portfolio-item
            modal="lettering"
            label="레터링"
            description="취미생활?"
            src="/src/images/budha.png"
            date="2021-02-22"
            keywords='["취미생활","레터링"]'
          ></mm-portfolio-item>
        </section>
      </mm-tab-panel>

      <mm-tab-panel value="weekly">
        <section class="portfolio-grid">
          <mm-portfolio-item
            modal="flat_sitemap"
            label="Flat sitemap"
            date="2023-04-01"
          ></mm-portfolio-item>
        </section>
      </mm-tab-panel>

      <mm-tab-panel value="monthly">
        <mm-result
          title="아직 새 글이 없어요."
          description="포트폴리오를 업로드하여 수줍이님을 알려보세요."
        >
        </mm-result>
      </mm-tab-panel>
    </mm-tabs>
  </section>
</main>
