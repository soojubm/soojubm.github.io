<main class="page">
  <mm-title-with-description
    level="1"
    title="Result"
    description="실행 결과를 피드백하는 섹션 또는 페이지 단위의 컴포넌트."
  ></mm-title-with-description>

  <dl class="article-aka">
    <dt>a.k.a.</dt>
    <dd title="">EmptyState</dd>
    <dd title="github">Blankslate</dd>
  </dl>

  <section class="component-example">
    <mm-result
      avatarIcon="clipboard-check"
      title="주문을 확인해주세요."
      description="헌법재판소 재판관의 임기는 6년으로 하며, 법률이 정하는 바에 의하여 연임할 수 있다."
      center="true"
    >
      <!-- <mm-avatar slot="avatar" variant="secondary" size="huge" icon="clipboard-check"></mm-avatar> -->
      <!-- <mm-keyvalue key="주문일자" value="2019.08.10."> </mm-keyvalue>
      <mm-keyvalue key="결제금액" value="₩ 54,000"> </mm-keyvalue> -->
      <mm-group slot="action" variant="button">
        <mm-button variant="tertiary" size="large">홈으로</mm-button>
        <mm-button variant="primary" size="large">주문내역 보기</mm-button>
      </mm-group>
    </mm-result>
  </section>

  <mm-component-props>
    <mm-prop name="src" type="string"></mm-prop>
    <mm-prop name="alt" type="string"></mm-prop>
    <mm-prop name="ratio" type="'1:1' | '16:9' | '4:3' = '1:1'"></mm-prop>
    <mm-prop name="clickable" type="boolean"></mm-prop>
    <mm-prop name="@click" type="(e: MouseEvent) => void" kind="event"></mm-prop>
  </mm-component-props>

  <section class="component-guide">
    <mm-text-group>
      <mm-text variant="heading4">You're done!</mm-text>
      <mm-text variant="body">
        <!-- 완료Complete. 오류Error. 빈 데이터Empty Data. 비공개. -->
        empty content, error feedback, Order Completed, Booking Confirmed, Registration Complete,
        Submission Successful, Payment Successful
      </mm-text>
      <mm-text variant="heading4">텍스트 모듈</mm-text>
      <mm-text variant="body">
        <del>
          왼쪽 정렬의 기본적인 텍스트 모듈과 대비를 위해 가운데 정렬합니다. foundation:: 콘텐츠
          모듈로 콘텐츠 간의 맥락 전환을 시각화하는 것이 . 보류
        </del>
      </mm-text>
    </mm-text-group>
  </section>
</main>
