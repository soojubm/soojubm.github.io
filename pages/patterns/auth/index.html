<style>
  .authentication {
    width: 100%;
    max-width: var(--width-medium);
    margin: 0 auto;
  }

  .authentication-fieldset {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .authentication-foot {
    margin: var(--space-3) 0;
    position: relative;
  }
</style>

<main class="page" style="display: flex">
  <div>

    <!-- 로그인 -->
    <form class="authentication" name="login" action="" method="" novalidate>
      <mm-title-with-description
        level="2"
        title="Sign in to your account"
        description="Lorem Ipsum is simply dummy text."
      ></mm-title-with-description>
      <br />

      <fieldset class="authentication-fieldset">
        <mm-button size="large" isfullwidth>페이스북으로 시작</mm-button>
        <mm-separator spacing="small">
          <mm-text slot="text" size="14">또는</mm-text>
        </mm-separator>
        <mm-textfield type="email" label="이메일" placeholder="soojubm@gmail.com"></mm-textfield>
        <mm-textfield type="password" label="비밀번호" placeholder="8자리 이상">
          <mm-link slot="link" href="forgot.html">비밀번호를 잊으셨나요?</mm-link>
        </mm-textfield>
        <div style="margin-top: -0.25rem">
          <mm-checkbox name="remember">로그인 상태 유지</mm-checkbox>
        </div>
      </fieldset>

      <mm-notice variant="danger" text="가입하지 않은 이메일이거나 잘못된 비밀번호입니다."></mm-notice>

      <footer class="authentication-foot">
        <mm-button variant="primary" size="large" isfullwidth type="submit">로그인</mm-button>
        <p style="display: flex; justify-content: center; gap: var(--space-2); margin: 1.5rem 0 0">
          계정이 없으신가요?
          <mm-link href="signup.html">지금 가입하기</mm-link>
        </p>
      </footer>
    </form>

    <br /><br />

    <!-- 회원가입 -->
    <form class="authentication" name="signup">
      <mm-title-with-description
        level="2"
        title="Welcome!"
        description="Find your people. Engage your customers. Build your brand. Do it all with Mailchimp's Marketing Platform."
      ></mm-title-with-description>
      <mm-link href="#">Log in</mm-link>
      <br /><br />

      <fieldset class="authentication-fieldset">
        <legend hidden>필수입력</legend>
        <mm-button size="large" isfullwidth>페이스북으로 시작</mm-button>
        <mm-separator>
          <mm-text slot="text" size="14">또는</mm-text>
        </mm-separator>
        <mm-textfield type="email" label="이메일" placeholder="soojubm@gmail.com"></mm-textfield>
        <mm-textfield type="password" label="비밀번호" placeholder="8자리 이상"></mm-textfield>
      </fieldset>

      <fieldset class="authentication-fieldset" style="margin: 1rem 0 0">
        <legend hidden>선택입력</legend>
        <mm-textfield label="닉네임" placeholder="수줍이" is-optional></mm-textfield>
        <mm-group alignment="horizontal">
          <mm-textfield label="출생년도" placeholder="출생년도" is-optional></mm-textfield>
          <mm-dropdown>
            <option value="other">기타</option>
            <option value="female">여성</option>
            <option value="male">남성</option>
          </mm-dropdown>
        </mm-group>
      </fieldset>

      <fieldset class="authentication-fieldset">
        <legend hidden>약관 동의</legend>
        <div style="height: var(--space-2)"></div>
        <strong>
          회원가입 시 <mm-link href="#">이용약관</mm-link>과
          <mm-link href="#">개인정보처리방침</mm-link>에 동의하는 것으로 간주합니다.
        </strong>
        <mm-group alignment="vertical">
          <mm-checkbox class="js-checkall">모두 동의합니다.</mm-checkbox>
          <mm-checkbox>이용약관 동의</mm-checkbox>
          <mm-checkbox>개인정보처리방침에 동의합니다.</mm-checkbox>
          <mm-checkbox>[선택] 광고성 정보 수신 동의</mm-checkbox>
        </mm-group>
      </fieldset>

      <footer class="authentication-foot">
        <mm-button variant="primary" size="large" isfullwidth type="submit" disabled>
          이메일 주소로 가입
        </mm-button>
      </footer>
    </form>

    <!-- 비밀번호 재설정 요청 -->
    <form class="authentication" name="password" action="" method="" style="max-width: 560px">
      <mm-title-with-description
        level="2"
        title="Reset Your Password"
        description="비밀번호가 기억이 안 나세요? 걱정 말아요! 임시 비밀번호를 이메일로 보내드릴게요."
      ></mm-title-with-description>
      <br />

      <fieldset class="authentication-fieldset">
        <mm-textfield label="이메일 주소" placeholder="soojubm@gmail.com"></mm-textfield>
      </fieldset>
      <footer class="authentication-foot">
        <mm-button type="submit" variant="primary" size="large">재설정 메일 받기</mm-button>
      </footer>
      <aside style="margin-top: 1.5rem">
        <p>이메일을 받지 못하셨나요? <mm-link href="">알아보기</mm-link></p>
      </aside>
    </form>

    <!-- 새 비밀번호 입력 -->
    <form class="authentication" name="password-reset" style="max-width: 560px" action="">
      <mm-title-with-description
        level="2"
        title="비밀번호 재설정"
        description="Enter your email to receive a password reset link"
      ></mm-title-with-description>
      <br />
      <fieldset class="authentication-fieldset">
        <mm-textfield label="새 비밀번호" autofocus></mm-textfield>
        <mm-textfield label="새 비밀번호 확인"></mm-textfield>
      </fieldset>
      <footer class="authentication-foot">
        <mm-button type="submit" variant="primary" size="large">비밀번호 변경</mm-button>
      </footer>
    </form>

    <!-- 이메일 인증 코드 입력 -->
    <form class="authentication" name="verify" style="max-width: 560px">
      <mm-title-with-description
        level="2"
        title="Please check your email!"
        description="6자리 인증 코드를 입력해주세요."
      ></mm-title-with-description>
      <mm-link href="signin.html">인증번호 재전송</mm-link>
      <br /><br />
      <mm-group alignment="horizontal">
        <mm-textfield type="number" name="code1" maxlength="1" style="width: var(--size-large)"></mm-textfield>
        <mm-textfield type="number" name="code2" maxlength="1" style="width: var(--size-large)"></mm-textfield>
        <mm-textfield type="number" name="code3" maxlength="1" style="width: var(--size-large)"></mm-textfield>
        <mm-textfield type="number" name="code4" maxlength="1" style="width: var(--size-large)"></mm-textfield>
      </mm-group>
    </form>

    <!-- 재설정 메일 발송 완료 -->
    <section style="margin: 8rem 0">
      <mm-title-with-description
        level="2"
        title="메일함을 확인하세요."
        description="faf@faf.co으로 비밀번호 재설정 링크를 발송했습니다."
      ></mm-title-with-description>
      <mm-button-group>
        <mm-button>이메일 재전송 버튼</mm-button>
        <mm-button href="#">로그인하기</mm-button>
      </mm-button-group>
    </section>

  </div>
</main>
