<main class="page" aria-label="site">
  <mm-title-with-description
    title="Table"
    description="표와 관련된 컴포넌트 및 패턴들."
  ></mm-title-with-description>
  <section class="component-example">
    <header
      style="
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--space-4) 0;
      "
    >
      <mm-text variant="heading2">Products</mm-text>
      <mm-group variant="chip">
        <mm-button>
          <mm-icon slot="prefix" name="import"></mm-icon>
          가져오기
        </mm-button>
        <mm-button variant="primary"> 추가하기 </mm-button>
      </mm-group>
    </header>

    <div style="width: 320px">
      <mm-toggle-button-group
        id="button-list"
        options='[
            {"label": "All", "value": "apple"},
            {"label": "Draft", "value": "banana"},
            {"label": "Cherry", "value": "cherry"}
          ]'
      ></mm-toggle-button-group>
    </div>

    <!-- <mm-group variant="chip">
      <mm-button status="active">All</mm-button>
      <mm-button>Active</mm-button>
      <mm-button>Draft</mm-button>
    </mm-group> -->

    <menu
      role="menubar"
      style="display: flex; align-items: center; margin: var(--space-3) 0; gap: 1rem"
    >
      <mm-searchfield
        size="small"
        hiddenLabel="false"
        placeholder="검색꾸"
        value="유저"
      ></mm-searchfield>
      <mm-checkbox name="test1">28 selected</mm-checkbox>
    </menu>
    <div class="table-container">
      <table>
        <caption hidden>
          히라가나 오십음도
        </caption>
        <colgroup>
          <col style="width: var(--col-checkbox)" />
          <col style="width: 80px" />
          <col style="width: 240px" />
          <col style="width: 80px" />
          <col style="width: 80px" />
          <col style="width: 80px" />
          <col style="width: 160px" />
        </colgroup>
        <thead>
          <tr>
            <th role="columnheader" aria-sort="none" style="width: calc(40px)">
              <mm-checkbox></mm-checkbox>
            </th>
            <th scope="col" aria-sort="none" style="width: 15%">
              <div style="display: flex; align-items: center; gap: var(--space-1)">
                Name
                <mm-icon name="arrow-separate-vertical" size="tiny"></mm-icon>
              </div>
            </th>
            <th scope="col" aria-sort="none" style="width: calc(65% - 80px)">Title</th>
            <th scope="col" aria-sort="none" style="width: 128px">Link</th>
            <th scope="col" aria-sort="none" style="width: auto">Status</th>
            <th scope="col" aria-sort="none" style="width: 8%; text-align: right">Age</th>
            <th scope="col" aria-sort="none" style="width: 140px">
              <span hidden>visually hidden</span>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <mm-checkbox></mm-checkbox>
            </td>
            <th scope="row">
              <div style="display: flex; align-items: center; gap: var(--space-2)">
                <mm-avatar variant="secondary" default="true"></mm-avatar>
                Gabriel
              </div>
            </th>
            <td>
              <div style="display: flex; align-items: center; gap: var(--space-2)">
                <mm-tag>Male</mm-tag>
                <mm-text>타이틀</mm-text>
              </div>
            </td>
            <td>
              <mm-link isExternal="true"> External link </mm-link>
            </td>
            <td>
              <mm-group variant="tag">
                <mm-category-tag category="music">유저리서치</mm-category-tag>
              </mm-group>
            </td>
            <td style="text-align: right">13</td>
            <td style="text-align: right">
              <div style="display: flex; align-items: center; gap: var(--space-2)">
                <mm-button>액션</mm-button>
                <mm-icon-button variant="navigator" icon="more-vert"></mm-icon-button>
              </div>
            </td>
          </tr>
          <tr>
            <td>
              <mm-checkbox checked></mm-checkbox>
            </td>
            <th scope="row">
              <div style="display: flex; align-items: center; gap: var(--space-2)">
                <mm-avatar variant="secondary" default="true"></mm-avatar>
                Ella
              </div>
            </th>
            <td>
              <div style="display: flex; align-items: center; gap: var(--space-2)">
                <mm-tag>Female</mm-tag>
                <mm-text>You can't compress the program...</mm-text>
              </div>
            </td>
            <td>
              <mm-link>
                <mm-link isExternal="true"> External link </mm-link>
              </mm-link>
            </td>
            <td>
              <mm-category-tag category="finance">유저플로우</mm-category-tag>
            </td>
            <td style="text-align: right">8</td>
            <td style="text-align: right">
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: flex-end;
                  gap: var(--space-2);
                "
              >
                <mm-button>액션</mm-button>
                <mm-icon-button variant="navigator" icon="more-vert"></mm-icon-button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <nav class="pagination" aria-label="pagination" style="margin: 1rem 0">
      <button
        variant="navigator"
        class="pagination-link pagination-previous"
        aria-label="앞 페이지로 이동"
      >
        이전
      </button>
      <button
        variant="navigator"
        class="pagination-link pagination-next"
        aria-label="뒷 페이지로 이동"
      >
        다음
      </button>
      <button variant="navigator" class="pagination-link" aria-label="맨 앞 페이지로 이동">
        1
      </button>
      <i class="pagination-ellipsis" aria-label="맨 앞 페이지로 이동">...</i>
      <button variant="navigator" class="pagination-link" href="#" aria-label="1 페이지로 이동">
        5
      </button>
      <button class="pagination-link" href="#" aria-label="1 페이지로 이동">6</button>
      <button
        status="active"
        class="pagination-link is-current"
        aria-label="1 페이지로 이동"
        aria-current="true"
      >
        7
      </button>
      <button class="pagination-link" href="#" aria-label="1 페이지로 이동">8</button>
      <button class="pagination-link" href="#" aria-label="1 페이지로 이동">9</button>
      <i class="pagination-ellipsis" aria-label="맨 앞 페이지로 이동">...</i>
      <button class="pagination-link" aria-label="맨 뒤 페이지로 이동">50</button>
    </nav>

    <!-- <div>
      <style>
        [role='columnheader'],
        [role='cell'] {
          /* width: 25%; */
        }
        [role='row'] {
          display: flex;
          border-top: var(--border);
        }
      </style>
    </div>

    <div
      role="table"
      aria-label="Semantic Elements"
      aria-describedby="semantic_elements_table_desc"
      aria-rowcount="81"
    >
      <header role="rowgroup">
        <div role="row">
          <span role="columnheader" aria-sort="none">#</span>
        </div>
      </header>
      <div role="rowgroup">
        <div role="row" aria-rowindex="11"></div>
      </div>
    </div> -->
  </section>

  <mm-component-props>
    <mm-prop name="src" type="string"></mm-prop>
    <mm-prop name="alt" type="string"></mm-prop>
    <mm-prop name="ratio" type="'1:1' | '16:9' | '4:3' = '1:1'"></mm-prop>
    <mm-prop name="clickable" type="boolean"></mm-prop>
    <mm-prop name="@click" type="(e: MouseEvent) => void" kind="event"></mm-prop>
  </mm-component-props>

  <section class="component-guide">
    <mm-text-list
      texts='[
        "첫 페이지와 마지막 페이지에 더블 화살표 아이콘을 사용하지 마세요. 최초 페이지와 최종 페이지 넘버를 제공하면 사용자는 대략적인 콘텐츠 수량을 파악할 수 있습니다.",
        "서버에서 offset을 0으로 줄 때도 있었고 1로 줄 때도 있다.",
        "모든 행이 DOM에 존재하는 경우 aria-rowindex 불필요"
      ]'
    >
    </mm-text-list>
  </section>

  <mm-component-section title="Paginations" description="">
    <div>
      <div role="status">
        <small>숙소 300개 이상 중 <b>281 – 300</b> (airbnb)</small>
      </div>

      <mm-group>
        <mm-text>page</mm-text>
        <mm-button size="small">
          <mm-icon size="tiny" name="nav-arrow-down"></mm-icon>
        </mm-button>
        <mm-text>of 22</mm-text>
      </mm-group>
    </div>
  </mm-component-section>

  <!-- <p>pagination vs more load vs infinite scroll. 느린 탐색 경험이 필요할 때. 게시판이나 상품 목록의 탐색에서 이전에 탐색한 상품의 위치를 찾기 편리함. 최근 본 목록이나 섬네일에서 북마크를 제공한다면?</p> -->
</main>
