<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Smooth Rotating Gradient</title>
    <style>
      body {
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      svg {
        width: 800px;
        height: 800px;
      }
      .rotate {
        transform-origin: 50% 50%;
        animation: spin 4s linear infinite;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- 공통 첫 색상: #ff5f6d -->
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f00" />
          <stop offset="50%" stop-color="#ffc371" />
          <stop offset="100%" stop-color="#47c6ff" />
        </linearGradient>

        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f00" />
          <stop offset="50%" stop-color="#4a00e0" />
          <stop offset="100%" stop-color="#00c9ff" />
        </linearGradient>

        <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f00" />
          <stop offset="50%" stop-color="#96c93d" />
          <stop offset="100%" stop-color="#f9d423" />
        </linearGradient>

        <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f00" />
          <stop offset="50%" stop-color="#3f5efb" />
          <stop offset="100%" stop-color="#43e97b" />
        </linearGradient>
      </defs>

      <!-- 회전하는 그라디언트 배경 -->
      <g class="rotate">
        <path id="bg-path" d="M50,10 a40,40 0 1,1 -0.1,0" fill="url(#grad1)" />
      </g>

      <!-- 회전하지 않는 하얀 원 -->
      <path d="M50,30 a20,20 0 1,1 -0.1,0" fill="white" />
    </svg>

    <script>
      const gradients = ['url(#grad1)', 'url(#grad2)', 'url(#grad3)', 'url(#grad4)']
      let current = 0
      const path = document.getElementById('bg-path')

      setInterval(() => {
        current = (current + 1) % gradients.length
        path.setAttribute('fill', gradients[current])
      }, 1000) // 1초마다 전환 → 4초 주기와 맞춤
    </script>
  </body>
</html>
