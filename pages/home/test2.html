<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정지된 흰색 원 & 회전 그라데이션</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
  }

  svg {
    border: 1px solid #ccc;
    background-color: white;
  }

  /* 그라데이션 배경 path */
  #animatedBackground {
    animation: changeGradient 1.6s infinite steps(1);
  }

  /* 원형 path는 이제 애니메이션 없음 */
  #myCircle {
    /* 기존 애니메이션 속성 제거 또는 비활성화 */
    /* animation: none; */ /* 또는 단순히 이 속성들을 제거 */
    /* transform-origin: center center; */
  }

  /* 그라데이션 변경 애니메이션 (이전과 동일) */
  @keyframes changeGradient {
    0% { fill: url(#gradientSet1); }
    25% { fill: url(#gradientSet2); }
    50% { fill: url(#gradientSet3); }
    75% { fill: url(#gradientSet4); }
    100% { fill: url(#gradientSet1); }
  }
</style>
</head>
<body>

<svg width="300" height="200" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="gradientSet1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8e44ad;" />
      <stop offset="50%" style="stop-color:#3498db;" />
      <stop offset="100%" style="stop-color:#2ecc71;" />
      <animate attributeName="x1" from="0%" to="100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y1" from="0%" to="100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" from="100%" to="0%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" from="100%" to="0%" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="gradientSet2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;" />
      <stop offset="50%" style="stop-color:#f39c12;" />
      <stop offset="100%" style="stop-color:#f1c40f;" />
      <animate attributeName="x1" from="0%" to="100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y1" from="100%" to="0%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" from="100%" to="0%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" from="0%" to="100%" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="gradientSet3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1abc9c;" />
      <stop offset="50%" style="stop-color:#34495e;" />
      <stop offset="100%" style="stop-color:#9b59b6;" />
      <animate attributeName="x1" from="100%" to="0%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y1" from="0%" to="100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" from="0%" to="100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" from="100%" to="0%" dur="4s" repeatCount="indefinite" />
    </linearGradient>

    <linearGradient id="gradientSet4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f8c8d;" />
      <stop offset="50%" style="stop-color:#bdc3c7;" />
      <stop offset="100%" style="stop-color:#ecf0f1;" />
      <animate attributeName="x1" from="100%" to="0%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y1" from="100%" to="0%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="x2" from="0%" to="100%" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" from="0%" to="100%" dur="4s" repeatCount="indefinite" />
    </linearGradient>
  </defs>

  <path id="animatedBackground" d="M0 0 H300 V200 H0 Z" fill="url(#gradientSet1)" />

  <path id="myCircle" d="M150,100 m-50,0 a50,50 0 1,0 100,0 a50,50 0 1
