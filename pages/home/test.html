<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Path 애니메이션</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background-color: #f0f0f0;
      }

      svg {
        border: 1px solid #ccc;
        background-color: white;
      }

      /* 원형 path 애니메이션 */
      #myCircle {
        transform-origin: center center; /* 변형 기준점을 중앙으로 설정 */
        animation: rotateAndScale 3s infinite alternate; /* 애니메이션 적용 */
      }

      @keyframes rotateAndScale {
        0% {
          transform: rotate(0deg) scale(1);
          opacity: 1;
        }
        50% {
          transform: rotate(180deg) scale(1.2);
          opacity: 0.7;
        }
        100% {
          transform: rotate(360deg) scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <svg width="300" height="200" viewBox="0 0 300 200">
      <defs>
        <linearGradient id="gradientBackground" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color: #8e44ad" />
          <stop offset="100%" style="stop-color: #3498db" />
        </linearGradient>
      </defs>

      <path d="M0 0 H300 V200 H0 Z" fill="url(#gradientBackground)" />

      <path
        id="myCircle"
        d="M150,100 m-50,0 a50,50 0 1,0 100,0 a50,50 0 1,0 -100,0"
        fill="#e74c3c"
      />
    </svg>
  </body>
</html>
